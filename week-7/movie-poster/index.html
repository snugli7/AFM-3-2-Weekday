<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NETFLIX · 김부장 포스터 3종</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0b0b0b; color: #fff;
    font-family: "AppleSDGothicNeo", -apple-system, sans-serif;
    min-height: 100vh; padding: 40px 24px; text-align: center;
  }
  h1 { color: #e50914; font-size: 15px; letter-spacing: 4px; font-weight: 800; }
  .sub { color: #9a9a9a; font-size: 13px; margin: 8px 0 32px; }
  .grid {
    display: flex; flex-wrap: wrap; gap: 28px;
    justify-content: center; align-items: flex-start;
  }
  figure { width: min(90vw, 340px); }
  img {
    width: 100%; border-radius: 8px; display: block;
    box-shadow: 0 20px 55px rgba(0,0,0,.85), 0 0 0 1px rgba(255,255,255,.06);
    transition: transform .2s;
  }
  img:hover { transform: translateY(-6px) scale(1.02); }
  figcaption { color: #cfcfcf; font-size: 13px; margin-top: 12px; }
  .note { color: #6d6d6d; font-size: 11px; margin-top: 34px; }
</style>
</head>
<body>
  <h1>N E T F L I X &nbsp;S E R I E S · 김부장</h1>
  <div class="sub">실제 SBS 홍보 스틸컷 3종으로 제작한 포스터 · 소지섭 · 최대훈 · 윤경호 · 주상욱</div>
  <div class="grid">
    <figure><img src="kimbujang_poster_1.png?v=3" alt="포스터 1"><figcaption>Ver.1 · 프로필 (선글라스)</figcaption></figure>
    <figure><img src="kimbujang_poster_2.png?v=3" alt="포스터 2"><figcaption>Ver.2 · 정면 응시</figcaption></figure>
    <figure><img src="kimbujang_poster_3.png?v=3" alt="포스터 3"><figcaption>Ver.3 · 넥타이 클로즈업</figcaption></figure>
  </div>
  <div class="note">※ SBS 공식 스틸컷 기반 · 개인/연습용 팬 포스터 (재배포·상업적 이용 불가)</div>
</body>
</html>
