<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메모앱</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Button({ children, variant = 'primary', size = 'md', onClick, disabled = false, className = '' }) {
      const base = 'inline-flex items-center justify-center font-medium rounded-lg transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-indigo-600 text-white hover:bg-indigo-700 focus:ring-indigo-500 shadow-sm',
        secondary: 'bg-white text-gray-700 border border-gray-300 hover:bg-gray-50 focus:ring-indigo-500',
        danger: 'bg-red-50 text-red-600 hover:bg-red-100 focus:ring-red-500',
        ghost: 'text-gray-500 hover:text-gray-700 hover:bg-gray-100 focus:ring-gray-500',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-sm',
        md: 'px-4 py-2 text-sm',
        lg: 'px-6 py-3 text-base',
      };
      return (
        <button
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}
          onClick={onClick}
          disabled={disabled}
        >
          {children}
        </button>
      );
    }

    function Input({ label, value, onChange, placeholder, className = '', ...props }) {
      return (
        <div className={className}>
          {label && <label className="block text-sm font-medium text-gray-700 mb-1">{label}</label>}
          <input
            className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all duration-200 placeholder-gray-400"
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            {...props}
          />
        </div>
      );
    }

    function Textarea({ label, value, onChange, placeholder, rows = 4, className = '' }) {
      return (
        <div className={className}>
          {label && <label className="block text-sm font-medium text-gray-700 mb-1">{label}</label>}
          <textarea
            className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all duration-200 resize-none placeholder-gray-400"
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            rows={rows}
          />
        </div>
      );
    }

    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-xl shadow-sm border border-gray-100 ${className}`}>
          {children}
        </div>
      );
    }

    // ========================================
    // 🧩 Common Components
    // ========================================

    function Header() {
      return (
        <header className="bg-white border-b border-gray-200 sticky top-0 z-10">
          <div className="max-w-3xl mx-auto px-4 py-4 flex items-center gap-3">
            <div className="w-9 h-9 bg-indigo-600 rounded-lg flex items-center justify-center">
              <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
              </svg>
            </div>
            <div>
              <h1 className="text-lg font-bold text-gray-900">메모앱</h1>
              <p className="text-xs text-gray-500">간편하게 메모를 관리하세요</p>
            </div>
          </div>
        </header>
      );
    }

    function EmptyState() {
      return (
        <div className="text-center py-16">
          <div className="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg className="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
          </div>
          <p className="text-gray-500 text-sm">아직 메모가 없습니다</p>
          <p className="text-gray-400 text-xs mt-1">위 입력란에서 새 메모를 작성해보세요</p>
        </div>
      );
    }

    // ========================================
    // 📄 Page Components
    // ========================================

    function MemoForm({ onAdd }) {
      const [title, setTitle] = useState('');
      const [content, setContent] = useState('');
      const titleRef = useRef(null);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!title.trim() || !content.trim()) return;
        onAdd({ title: title.trim(), content: content.trim() });
        setTitle('');
        setContent('');
        titleRef.current?.focus();
      };

      const isValid = title.trim() && content.trim();

      return (
        <Card className="p-5">
          <form onSubmit={handleSubmit}>
            <h2 className="text-sm font-semibold text-gray-900 mb-3">새 메모 작성</h2>
            <Input
              ref={titleRef}
              value={title}
              onChange={(e) => setTitle(e.target.value)}
              placeholder="제목을 입력하세요"
              className="mb-3"
            />
            <Textarea
              value={content}
              onChange={(e) => setContent(e.target.value)}
              placeholder="내용을 입력하세요"
              rows={3}
              className="mb-3"
            />
            <div className="flex justify-end">
              <Button type="submit" disabled={!isValid}>
                <svg className="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
                </svg>
                메모 추가
              </Button>
            </div>
          </form>
        </Card>
      );
    }

    function MemoItem({ memo, onDelete }) {
      const [confirmDelete, setConfirmDelete] = useState(false);

      const formatDate = (timestamp) => {
        const date = new Date(timestamp);
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        const h = String(date.getHours()).padStart(2, '0');
        const min = String(date.getMinutes()).padStart(2, '0');
        return `${y}.${m}.${d} ${h}:${min}`;
      };

      const handleDelete = () => {
        if (confirmDelete) {
          onDelete(memo.id);
        } else {
          setConfirmDelete(true);
          setTimeout(() => setConfirmDelete(false), 3000);
        }
      };

      return (
        <Card className="p-5 hover:shadow-md transition-shadow duration-200">
          <div className="flex items-start justify-between gap-3">
            <div className="flex-1 min-w-0">
              <h3 className="font-semibold text-gray-900 text-base truncate">{memo.title}</h3>
              <p className="text-gray-600 text-sm mt-1.5 whitespace-pre-wrap break-words leading-relaxed">{memo.content}</p>
              <p className="text-gray-400 text-xs mt-3">{formatDate(memo.created_at)}</p>
            </div>
            <Button
              variant={confirmDelete ? 'danger' : 'ghost'}
              size="sm"
              onClick={handleDelete}
              className="shrink-0"
            >
              {confirmDelete ? '확인' : (
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
              )}
            </Button>
          </div>
        </Card>
      );
    }

    function MemoList({ memos, onDelete }) {
      if (memos.length === 0) return <EmptyState />;
      return (
        <div className="space-y-3">
          <div className="flex items-center justify-between">
            <h2 className="text-sm font-semibold text-gray-900">
              전체 메모 <span className="text-indigo-600">{memos.length}</span>
            </h2>
          </div>
          {memos.map((memo) => (
            <MemoItem key={memo.id} memo={memo} onDelete={onDelete} />
          ))}
        </div>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================

    const API = '/api/memos';

    function App() {
      const [memos, setMemos] = useState([]);
      const [loading, setLoading] = useState(true);

      const fetchMemos = async () => {
        try {
          const res = await fetch(API);
          const data = await res.json();
          setMemos(data);
        } catch (err) {
          console.error('메모 불러오기 실패:', err);
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => { fetchMemos(); }, []);

      const addMemo = async (data) => {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        if (res.ok) fetchMemos();
      };

      const deleteMemo = async (id) => {
        await fetch(`${API}/${id}`, { method: 'DELETE' });
        fetchMemos();
      };

      return (
        <div className="min-h-screen bg-gray-50">
          <Header />
          <main className="max-w-3xl mx-auto px-4 py-6 space-y-6">
            <MemoForm onAdd={addMemo} />
            <MemoList memos={memos} onDelete={deleteMemo} />
          </main>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
