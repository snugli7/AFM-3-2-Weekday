<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>만 나이 계산기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .gradient-bg {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .card-shadow {
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    }
    .result-card {
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.9);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.5s ease-out forwards;
    }
    @keyframes pulse-slow {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .pulse-slow {
      animation: pulse-slow 2s ease-in-out infinite;
    }
  </style>
</head>
<body class="min-h-screen gradient-bg flex items-center justify-center p-4">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useMemo } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================
    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-2xl card-shadow p-6 sm:p-8 ${className}`}>
          {children}
        </div>
      );
    }

    function StatCard({ icon, label, value, unit, color, delay = 0 }) {
      return (
        <div
          className="result-card rounded-xl p-4 sm:p-5 border border-gray-100 animate-fade-in-up"
          style={{ animationDelay: `${delay}ms` }}
        >
          <div className="flex items-center gap-3 mb-2">
            <span className={`text-2xl ${color}`}>{icon}</span>
            <span className="text-sm text-gray-500 font-medium">{label}</span>
          </div>
          <div className="flex items-baseline gap-1">
            <span className={`text-3xl sm:text-4xl font-bold ${color}`}>{value}</span>
            <span className="text-gray-400 text-sm">{unit}</span>
          </div>
        </div>
      );
    }

    function DetailRow({ label, value }) {
      return (
        <div className="flex justify-between items-center py-2 border-b border-gray-100 last:border-0">
          <span className="text-gray-500 text-sm">{label}</span>
          <span className="font-semibold text-gray-800">{value}</span>
        </div>
      );
    }

    // ========================================
    // 🧮 Age Calculation Logic
    // ========================================
    function calculateAge(birthDate) {
      const today = new Date();
      const birth = new Date(birthDate);

      if (isNaN(birth.getTime()) || birth > today) return null;

      let years = today.getFullYear() - birth.getFullYear();
      let months = today.getMonth() - birth.getMonth();
      let days = today.getDate() - birth.getDate();

      if (days < 0) {
        months--;
        const prevMonth = new Date(today.getFullYear(), today.getMonth(), 0);
        days += prevMonth.getDate();
      }

      if (months < 0) {
        years--;
        months += 12;
      }

      // 총 일수 계산
      const diffTime = today.getTime() - birth.getTime();
      const totalDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
      const totalWeeks = Math.floor(totalDays / 7);
      const totalMonths = years * 12 + months;

      // 다음 생일까지 남은 일수
      let nextBirthday = new Date(today.getFullYear(), birth.getMonth(), birth.getDate());
      if (nextBirthday <= today) {
        nextBirthday = new Date(today.getFullYear() + 1, birth.getMonth(), birth.getDate());
      }
      const daysUntilBirthday = Math.ceil((nextBirthday.getTime() - today.getTime()) / (1000 * 60 * 60 * 24));

      // 오늘이 생일인지 확인
      const isBirthdayToday = today.getMonth() === birth.getMonth() && today.getDate() === birth.getDate();

      // 띠 계산
      const zodiacAnimals = ['원숭이', '닭', '개', '돼지', '쥐', '소', '호랑이', '토끼', '용', '뱀', '말', '양'];
      const zodiac = zodiacAnimals[birth.getFullYear() % 12];

      // 별자리 계산
      const constellation = getConstellation(birth.getMonth() + 1, birth.getDate());

      return {
        years,
        months,
        days,
        totalDays,
        totalWeeks,
        totalMonths,
        daysUntilBirthday,
        isBirthdayToday,
        zodiac,
        constellation,
        dayOfWeek: birth.toLocaleDateString('ko-KR', { weekday: 'long' }),
      };
    }

    function getConstellation(month, day) {
      const dates = [20, 19, 21, 20, 21, 21, 23, 23, 23, 23, 22, 22];
      const signs = ['물병자리', '물고기자리', '양자리', '황소자리', '쌍둥이자리', '게자리',
                     '사자자리', '처녀자리', '천칭자리', '전갈자리', '사수자리', '염소자리'];
      return day < dates[month - 1] ? signs[month - 1] : signs[month % 12];
    }

    // ========================================
    // 📄 App Component
    // ========================================
    function App() {
      const [birthDate, setBirthDate] = useState('');

      const result = useMemo(() => {
        if (!birthDate) return null;
        return calculateAge(birthDate);
      }, [birthDate]);

      const todayStr = new Date().toISOString().split('T')[0];

      return (
        <div className="w-full max-w-lg mx-auto">
          {/* Header */}
          <div className="text-center mb-6">
            <h1 className="text-3xl sm:text-4xl font-bold text-white mb-2">
              만 나이 계산기
            </h1>
            <p className="text-purple-200 text-sm sm:text-base">
              생년월일을 선택하면 정확한 만 나이를 알려드립니다
            </p>
          </div>

          {/* Input Card */}
          <Card className="mb-6">
            <label className="block text-sm font-medium text-gray-600 mb-2">
              생년월일을 선택하세요
            </label>
            <input
              type="date"
              value={birthDate}
              max={todayStr}
              onChange={(e) => setBirthDate(e.target.value)}
              className="w-full px-4 py-3 text-lg border-2 border-purple-200 rounded-xl
                         focus:border-purple-500 focus:ring-2 focus:ring-purple-200
                         outline-none transition-all cursor-pointer bg-purple-50
                         hover:bg-purple-100"
            />
            {birthDate && !result && (
              <p className="mt-2 text-red-500 text-sm">
                올바른 생년월일을 입력해주세요. 미래 날짜는 선택할 수 없습니다.
              </p>
            )}
          </Card>

          {/* Results */}
          {result && (
            <div className="space-y-4">
              {/* Birthday Message */}
              {result.isBirthdayToday && (
                <div className="bg-yellow-50 border-2 border-yellow-300 rounded-2xl p-4 text-center animate-fade-in-up pulse-slow">
                  <span className="text-4xl block mb-2">&#127874;</span>
                  <p className="text-yellow-800 font-bold text-lg">
                    오늘은 생일이에요! 축하합니다!
                  </p>
                </div>
              )}

              {/* Main Age Display */}
              <Card className="text-center animate-fade-in-up">
                <p className="text-gray-500 text-sm mb-1">현재 만 나이</p>
                <div className="flex items-baseline justify-center gap-1">
                  <span className="text-6xl sm:text-7xl font-bold bg-gradient-to-r from-purple-600 to-indigo-600 bg-clip-text text-transparent">
                    {result.years}
                  </span>
                  <span className="text-2xl text-gray-400">세</span>
                </div>
                <p className="text-gray-600 mt-2 text-lg">
                  {result.years}년 {result.months}개월 {result.days}일
                </p>
              </Card>

              {/* Stat Cards */}
              <div className="grid grid-cols-2 gap-3">
                <StatCard
                  icon="&#128197;"
                  label="다음 생일까지"
                  value={result.isBirthdayToday ? 'D-Day' : `${result.daysUntilBirthday}`}
                  unit={result.isBirthdayToday ? '' : '일'}
                  color="text-pink-600"
                  delay={100}
                />
                <StatCard
                  icon="&#128338;"
                  label="살아온 날"
                  value={result.totalDays.toLocaleString()}
                  unit="일"
                  color="text-indigo-600"
                  delay={200}
                />
                <StatCard
                  icon="&#128203;"
                  label="살아온 주"
                  value={result.totalWeeks.toLocaleString()}
                  unit="주"
                  color="text-emerald-600"
                  delay={300}
                />
                <StatCard
                  icon="&#127760;"
                  label="살아온 개월"
                  value={result.totalMonths.toLocaleString()}
                  unit="개월"
                  color="text-amber-600"
                  delay={400}
                />
              </div>

              {/* Additional Info */}
              <Card className="animate-fade-in-up" style={{ animationDelay: '400ms' }}>
                <h3 className="font-semibold text-gray-700 mb-3 flex items-center gap-2">
                  <span>&#128300;</span> 상세 정보
                </h3>
                <DetailRow label="태어난 요일" value={result.dayOfWeek} />
                <DetailRow label="띠" value={`${result.zodiac}띠`} />
                <DetailRow label="별자리" value={result.constellation} />
                <DetailRow
                  label="다음 생일"
                  value={
                    result.isBirthdayToday
                      ? '오늘이 생일입니다!'
                      : `${result.daysUntilBirthday}일 남음`
                  }
                />
              </Card>
            </div>
          )}

          {/* Empty State */}
          {!birthDate && (
            <Card className="text-center">
              <div className="py-8">
                <span className="text-6xl block mb-4">&#128198;</span>
                <p className="text-gray-500 text-lg">
                  위에서 생년월일을 선택해주세요
                </p>
                <p className="text-gray-400 text-sm mt-1">
                  만 나이, 상세 나이, 다음 생일까지의<br/>남은 일수를 계산해 드립니다
                </p>
              </div>
            </Card>
          )}

          {/* Footer */}
          <p className="text-center text-purple-200 text-xs mt-6">
            오늘 기준: {new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' })}
          </p>
        </div>
      );
    }

    // ========================================
    // 🚀 Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
