<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Shades Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .copy-toast {
      animation: toastIn 0.3s ease, toastOut 0.3s ease 1.2s forwards;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
    input[type="color"] {
      -webkit-appearance: none;
      border: none;
      padding: 0;
      cursor: pointer;
    }
    input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
      border-radius: 9999px;
    }
    input[type="color"]::-webkit-color-swatch {
      border: 2px solid rgba(0,0,0,0.1);
      border-radius: 9999px;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useCallback, useMemo, useRef, useEffect } = React;

    // ========================================
    // Color Utility Functions
    // ========================================
    function hexToRgb(hex) {
      const h = hex.replace('#', '');
      return {
        r: parseInt(h.substring(0, 2), 16),
        g: parseInt(h.substring(2, 4), 16),
        b: parseInt(h.substring(4, 6), 16),
      };
    }

    function rgbToHex(r, g, b) {
      const toHex = (n) => Math.round(Math.min(255, Math.max(0, n))).toString(16).padStart(2, '0');
      return `#${toHex(r)}${toHex(g)}${toHex(b)}`.toUpperCase();
    }

    function rgbToHsl(r, g, b) {
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      let h, s, l = (max + min) / 2;
      if (max === min) {
        h = s = 0;
      } else {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
          case g: h = ((b - r) / d + 2) / 6; break;
          case b: h = ((r - g) / d + 4) / 6; break;
        }
      }
      return {
        h: Math.round(h * 360),
        s: Math.round(s * 100),
        l: Math.round(l * 100),
      };
    }

    function generateTint(rgb, factor) {
      return {
        r: Math.round(rgb.r + (255 - rgb.r) * factor),
        g: Math.round(rgb.g + (255 - rgb.g) * factor),
        b: Math.round(rgb.b + (255 - rgb.b) * factor),
      };
    }

    function generateShade(rgb, factor) {
      return {
        r: Math.round(rgb.r * (1 - factor)),
        g: Math.round(rgb.g * (1 - factor)),
        b: Math.round(rgb.b * (1 - factor)),
      };
    }

    function getContrastColor(hex) {
      const { r, g, b } = hexToRgb(hex);
      const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      return luminance > 0.5 ? '#1F2937' : '#FFFFFF';
    }

    function isValidHex(hex) {
      return /^#?[0-9A-Fa-f]{6}$/.test(hex);
    }

    function generateAllShades(baseHex) {
      const rgb = hexToRgb(baseHex);
      const tints = [];
      const shades = [];
      for (let i = 5; i >= 1; i--) {
        const factor = i * 0.15;
        const tintRgb = generateTint(rgb, factor);
        const hex = rgbToHex(tintRgb.r, tintRgb.g, tintRgb.b);
        const hsl = rgbToHsl(tintRgb.r, tintRgb.g, tintRgb.b);
        tints.push({ hex, rgb: tintRgb, hsl, label: `Tint ${i}`, percent: Math.round(factor * 100) });
      }
      const baseHsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
      const base = { hex: baseHex.toUpperCase(), rgb, hsl: baseHsl, label: '원본', percent: 0 };
      for (let i = 1; i <= 5; i++) {
        const factor = i * 0.15;
        const shadeRgb = generateShade(rgb, factor);
        const hex = rgbToHex(shadeRgb.r, shadeRgb.g, shadeRgb.b);
        const hsl = rgbToHsl(shadeRgb.r, shadeRgb.g, shadeRgb.b);
        shades.push({ hex, rgb: shadeRgb, hsl, label: `Shade ${i}`, percent: Math.round(factor * 100) });
      }
      return { tints, base, shades };
    }

    // ========================================
    // Design System Components
    // ========================================
    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-2xl shadow-sm border border-gray-100 ${className}`}>
          {children}
        </div>
      );
    }

    function Toast({ message, visible }) {
      if (!visible) return null;
      return (
        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50">
          <div className="copy-toast bg-gray-900 text-white px-5 py-3 rounded-xl shadow-lg text-sm font-medium flex items-center gap-2">
            <svg className="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
            </svg>
            {message}
          </div>
        </div>
      );
    }

    // ========================================
    // Color Swatch Card Component
    // ========================================
    function ColorCard({ color, onCopy }) {
      const textColor = getContrastColor(color.hex);
      const subTextColor = textColor === '#FFFFFF' ? 'rgba(255,255,255,0.7)' : 'rgba(31,41,55,0.6)';
      const isBase = color.label === '원본';

      return (
        <button
          onClick={() => onCopy(color.hex)}
          className={`group relative rounded-xl overflow-hidden transition-all duration-200 hover:scale-105 hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-400 ${isBase ? 'ring-2 ring-blue-500 ring-offset-2' : ''}`}
          style={{ backgroundColor: color.hex }}
          title={`${color.hex} 복사하기`}
          aria-label={`${color.label}: ${color.hex} 클릭하여 복사`}
        >
          <div className="p-4 flex flex-col items-start min-h-[140px] justify-between w-full">
            <div className="flex items-center justify-between w-full">
              <span className="text-xs font-semibold tracking-wide uppercase" style={{ color: subTextColor }}>
                {color.label}
              </span>
              {isBase && (
                <span className="text-[10px] font-bold px-2 py-0.5 rounded-full" style={{ backgroundColor: textColor, color: color.hex }}>
                  BASE
                </span>
              )}
            </div>
            <div className="w-full">
              <p className="text-base font-bold tracking-wider mb-1" style={{ color: textColor }}>
                {color.hex}
              </p>
              <p className="text-[11px] font-mono leading-relaxed" style={{ color: subTextColor }}>
                rgb({color.rgb.r}, {color.rgb.g}, {color.rgb.b})
              </p>
              <p className="text-[11px] font-mono" style={{ color: subTextColor }}>
                hsl({color.hsl.h}, {color.hsl.s}%, {color.hsl.l}%)
              </p>
            </div>
          </div>
          <div className="absolute inset-0 flex items-center justify-center bg-black/0 group-hover:bg-black/10 transition-colors">
            <svg className="w-6 h-6 opacity-0 group-hover:opacity-100 transition-opacity" style={{ color: textColor }} fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
            </svg>
          </div>
        </button>
      );
    }

    // ========================================
    // Gradient Bar Component
    // ========================================
    function GradientBar({ allColors }) {
      return (
        <Card className="p-6">
          <h2 className="text-lg font-semibold text-gray-800 mb-4">그라데이션 바</h2>
          <div className="rounded-xl overflow-hidden h-16 flex shadow-inner">
            {allColors.map((color, i) => (
              <div
                key={i}
                className="flex-1 relative group cursor-pointer transition-all hover:flex-[2]"
                style={{ backgroundColor: color.hex }}
                title={color.hex}
              >
                <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                  <span className="text-[10px] font-bold px-1.5 py-0.5 rounded-md shadow-sm" style={{ backgroundColor: 'rgba(255,255,255,0.9)', color: '#1F2937' }}>
                    {color.hex}
                  </span>
                </div>
              </div>
            ))}
          </div>
          <div className="flex justify-between mt-2">
            <span className="text-xs text-gray-400">밝게 (Lighter)</span>
            <span className="text-xs text-gray-400">어둡게 (Darker)</span>
          </div>
        </Card>
      );
    }

    // ========================================
    // Color Table Component
    // ========================================
    function ColorTable({ allColors, onCopy }) {
      return (
        <Card className="overflow-hidden">
          <div className="p-6 pb-3">
            <h2 className="text-lg font-semibold text-gray-800">색상 정보 테이블</h2>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="border-t border-b border-gray-100">
                  <th className="text-left py-3 px-6 text-gray-500 font-medium text-xs uppercase tracking-wider">색상</th>
                  <th className="text-left py-3 px-6 text-gray-500 font-medium text-xs uppercase tracking-wider">레이블</th>
                  <th className="text-left py-3 px-6 text-gray-500 font-medium text-xs uppercase tracking-wider">HEX</th>
                  <th className="text-left py-3 px-6 text-gray-500 font-medium text-xs uppercase tracking-wider">RGB</th>
                  <th className="text-left py-3 px-6 text-gray-500 font-medium text-xs uppercase tracking-wider">HSL</th>
                  <th className="text-center py-3 px-6 text-gray-500 font-medium text-xs uppercase tracking-wider">복사</th>
                </tr>
              </thead>
              <tbody>
                {allColors.map((color, i) => {
                  const isBase = color.label === '원본';
                  return (
                    <tr key={i} className={`border-b border-gray-50 hover:bg-gray-50/50 transition-colors ${isBase ? 'bg-blue-50/30' : ''}`}>
                      <td className="py-3 px-6">
                        <div className="w-8 h-8 rounded-lg shadow-sm border border-gray-200/50" style={{ backgroundColor: color.hex }} />
                      </td>
                      <td className="py-3 px-6">
                        <span className={`text-sm ${isBase ? 'font-bold text-blue-600' : 'text-gray-700'}`}>
                          {color.label}
                        </span>
                      </td>
                      <td className="py-3 px-6 font-mono text-sm text-gray-800 font-medium">{color.hex}</td>
                      <td className="py-3 px-6 font-mono text-sm text-gray-600">
                        {color.rgb.r}, {color.rgb.g}, {color.rgb.b}
                      </td>
                      <td className="py-3 px-6 font-mono text-sm text-gray-600">
                        {color.hsl.h}, {color.hsl.s}%, {color.hsl.l}%
                      </td>
                      <td className="py-3 px-6 text-center">
                        <button
                          onClick={() => onCopy(color.hex)}
                          className="text-gray-400 hover:text-blue-500 transition-colors p-1 rounded-lg hover:bg-blue-50"
                          aria-label={`${color.hex} 복사`}
                        >
                          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                          </svg>
                        </button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </Card>
      );
    }

    // ========================================
    // App Component
    // ========================================
    function App() {
      const [hexInput, setHexInput] = useState('#3B82F6');
      const [activeColor, setActiveColor] = useState('#3B82F6');
      const [toast, setToast] = useState({ visible: false, message: '' });
      const toastTimeout = useRef(null);

      const showToast = useCallback((msg) => {
        if (toastTimeout.current) clearTimeout(toastTimeout.current);
        setToast({ visible: true, message: msg });
        toastTimeout.current = setTimeout(() => setToast({ visible: false, message: '' }), 1500);
      }, []);

      const handleCopy = useCallback((hex) => {
        navigator.clipboard.writeText(hex).then(() => {
          showToast(`${hex} 복사됨!`);
        }).catch(() => {
          showToast('복사에 실패했습니다.');
        });
      }, [showToast]);

      const handleHexInputChange = (e) => {
        let val = e.target.value;
        if (!val.startsWith('#')) val = '#' + val;
        setHexInput(val);
        if (isValidHex(val)) {
          setActiveColor(val.startsWith('#') ? val : '#' + val);
        }
      };

      const handlePickerChange = (e) => {
        const val = e.target.value.toUpperCase();
        setHexInput(val);
        setActiveColor(val);
      };

      const { tints, base, shades } = useMemo(() => generateAllShades(activeColor), [activeColor]);
      const allColors = useMemo(() => [...tints, base, ...shades], [tints, base, shades]);

      const inputValid = isValidHex(hexInput);

      return (
        <div className="min-h-screen bg-gradient-to-br from-gray-50 via-white to-gray-100">
          <Toast message={toast.message} visible={toast.visible} />

          {/* Header */}
          <header className="border-b border-gray-100 bg-white/80 backdrop-blur-sm sticky top-0 z-40">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 rounded-xl shadow-sm flex items-center justify-center" style={{ background: `linear-gradient(135deg, ${tints[4]?.hex || '#ddd'}, ${activeColor}, ${shades[4]?.hex || '#333'})` }}>
                  <svg className="w-5 h-5 text-white drop-shadow" fill="currentColor" viewBox="0 0 20 20">
                    <path fillRule="evenodd" d="M4 2a2 2 0 00-2 2v11a3 3 0 106 0V4a2 2 0 00-2-2H4zm1 14a1 1 0 100-2 1 1 0 000 2zm5-1.757l4.9-4.9a2 2 0 000-2.828L13.485 5.1a2 2 0 00-2.828 0L10 5.757v8.486zM16 18H9.071l6-6H16a2 2 0 012 2v2a2 2 0 01-2 2z" clipRule="evenodd" />
                  </svg>
                </div>
                <div>
                  <h1 className="text-lg font-bold text-gray-900 leading-tight">Color Shades</h1>
                  <p className="text-xs text-gray-400 hidden sm:block">색상 변형 생성기</p>
                </div>
              </div>

              {/* Color Input Area */}
              <div className="flex items-center gap-3">
                <div className="relative">
                  <input
                    type="color"
                    value={activeColor}
                    onChange={handlePickerChange}
                    className="w-10 h-10 rounded-full cursor-pointer"
                    aria-label="색상 선택기"
                  />
                </div>
                <div className="relative">
                  <input
                    type="text"
                    value={hexInput}
                    onChange={handleHexInputChange}
                    maxLength={7}
                    placeholder="#3B82F6"
                    className={`w-28 sm:w-32 px-3 py-2 rounded-xl border-2 text-sm font-mono font-medium focus:outline-none transition-colors ${
                      inputValid
                        ? 'border-gray-200 focus:border-blue-400 text-gray-800'
                        : 'border-red-300 focus:border-red-400 text-red-600'
                    }`}
                    aria-label="HEX 색상 코드 입력"
                  />
                  {!inputValid && hexInput.length > 1 && (
                    <p className="absolute -bottom-5 left-0 text-[10px] text-red-400">유효한 HEX 코드를 입력하세요</p>
                  )}
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-4 sm:px-6 py-8 space-y-8">
            {/* Base Color Preview */}
            <div className="flex flex-col sm:flex-row items-start sm:items-center gap-4">
              <div className="flex items-center gap-4">
                <div className="w-16 h-16 rounded-2xl shadow-lg border-2 border-white" style={{ backgroundColor: activeColor }} />
                <div>
                  <p className="text-2xl font-bold text-gray-900">{base.hex}</p>
                  <p className="text-sm text-gray-500">
                    RGB({base.rgb.r}, {base.rgb.g}, {base.rgb.b}) / HSL({base.hsl.h}, {base.hsl.s}%, {base.hsl.l}%)
                  </p>
                </div>
              </div>
            </div>

            {/* Gradient Bar */}
            <GradientBar allColors={allColors} />

            {/* Tints Section */}
            <div>
              <div className="flex items-center gap-2 mb-4">
                <div className="w-1 h-6 rounded-full bg-amber-400" />
                <h2 className="text-lg font-semibold text-gray-800">밝은 변형 (Tints)</h2>
                <span className="text-xs text-gray-400 ml-1">흰색 혼합</span>
              </div>
              <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3">
                {tints.map((color, i) => (
                  <ColorCard key={`tint-${i}`} color={color} onCopy={handleCopy} />
                ))}
              </div>
            </div>

            {/* Base */}
            <div>
              <div className="flex items-center gap-2 mb-4">
                <div className="w-1 h-6 rounded-full bg-blue-500" />
                <h2 className="text-lg font-semibold text-gray-800">원본 색상</h2>
              </div>
              <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3">
                <ColorCard color={base} onCopy={handleCopy} />
              </div>
            </div>

            {/* Shades Section */}
            <div>
              <div className="flex items-center gap-2 mb-4">
                <div className="w-1 h-6 rounded-full bg-gray-700" />
                <h2 className="text-lg font-semibold text-gray-800">어두운 변형 (Shades)</h2>
                <span className="text-xs text-gray-400 ml-1">검정 혼합</span>
              </div>
              <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3">
                {shades.map((color, i) => (
                  <ColorCard key={`shade-${i}`} color={color} onCopy={handleCopy} />
                ))}
              </div>
            </div>

            {/* Color Table */}
            <ColorTable allColors={allColors} onCopy={handleCopy} />

            {/* Footer */}
            <footer className="text-center py-6 text-xs text-gray-400">
              색상 카드를 클릭하면 HEX 코드가 클립보드에 복사됩니다.
            </footer>
          </main>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
