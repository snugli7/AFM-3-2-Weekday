      const today = new Date(); today.setHours(0,0,0,0);

    function loadData() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) return JSON.parse(saved);
      } catch(e) {}
      return { ingredients: DEFAULT_INGREDIENTS, recipes: DEFAULT_RECIPES };
    }

    // ========================================
    // Toast Context
    // ========================================
    const ToastContext = createContext();

    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);
      const addToast = useCallback((message, type = 'success') => {
        const id = generateId();
        setToasts(prev => [...prev, { id, message, type, leaving: false }]);
        setTimeout(() => {
          setToasts(prev => prev.map(t => t.id === id ? { ...t, leaving: true } : t));
          setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 300);
        }, 2700);
      }, []);
      return (
        <ToastContext.Provider value={addToast}>
          {children}
          <div className="fixed top-4 right-4 z-[100] flex flex-col gap-2 max-w-sm">
            {toasts.map(t => (
              <div key={t.id} className={`${t.leaving ? 'toast-out' : 'toast-in'} px-4 py-3 rounded-xl shadow-lg text-white font-medium text-sm flex items-center gap-2 ${
                t.type === 'success' ? 'bg-emerald-500' : t.type === 'error' ? 'bg-red-500' : 'bg-blue-500'
              }`}>
                <span>{t.type === 'success' ? '✅' : t.type === 'error' ? '❌' : 'ℹ️'}</span>
                <span>{t.message}</span>
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    }

    // ========================================
    // Router
    // ========================================
    const RouterContext = createContext();

    function Router({ children }) {
      const [path, setPath] = useState(window.location.hash.slice(1) || '/');
      useEffect(() => {
        const handler = () => setPath(window.location.hash.slice(1) || '/');
        window.addEventListener('hashchange', handler);
        return () => window.removeEventListener('hashchange', handler);
      }, []);
      const navigate = useCallback((to) => { window.location.hash = to; }, []);
      return <RouterContext.Provider value={{ path, navigate }}>{children}</RouterContext.Provider>;
    }

    function useRouter() { return useContext(RouterContext); }

    function matchRoute(pattern, path) {
      const patternParts = pattern.split('/');
      const pathParts = path.split('/');
      if (patternParts.length !== pathParts.length) return null;
      const params = {};
      for (let i = 0; i < patternParts.length; i++) {
        if (patternParts[i].startsWith(':')) {
          params[patternParts[i].slice(1)] = pathParts[i];
        } else if (patternParts[i] !== pathParts[i]) {
          return null;
        }
      }
      return params;
    }

    function Link({ to, children, className, activeClass = '', onClick }) {
      const { path, navigate } = useRouter();
      const isActive = path === to || (to !== '/' && path.startsWith(to));
      return (
        <a href={`#${to}`} className={`${className || ''} ${isActive ? activeClass : ''}`}
          onClick={(e) => { e.preventDefault(); navigate(to); onClick && onClick(); }}>
          {children}
        </a>
      );
    }

    // ========================================
    // Design System Components

    function Button({ variant = 'primary', size = 'md', disabled, onClick, children, className = '', type = 'button' }) {

      const variants = {
        primary: 'bg-gradient-to-r from-emerald-500 to-teal-500 text-white hover:from-emerald-600 hover:to-teal-600 focus:ring-emerald-500 shadow-md hover:shadow-lg',
        secondary: 'bg-white text-gray-700 border border-gray-200 hover:bg-gray-50 focus:ring-gray-300',
        danger: 'bg-red-500 text-white hover:bg-red-600 focus:ring-red-500',
        ghost: 'text-gray-600 hover:bg-gray-100 focus:ring-gray-300',
      };
      const sizes = { sm: 'px-3 py-1.5 text-xs gap-1.5', md: 'px-4 py-2 text-sm gap-2', lg: 'px-6 py-3 text-base gap-2' };
      return (
        <button type={type} disabled={disabled} onClick={onClick}
          className={`${base} ${variants[variant]} ${sizes[size]} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`}>
          {children}
        </button>
      );
    }

    function Input({ label, type = 'text', value, onChange, placeholder, error, disabled, required, className = '', ...rest }) {
      return (
        <div className={`flex flex-col gap-1 ${className}`}>
          {label && <label className="text-sm font-medium text-gray-700">{label}{required && <span className="text-red-500 ml-1">*</span>}</label>}

            {...rest} />
          {error && <span className="text-xs text-red-500">{error}</span>}
        </div>
      );
    }

    function Select({ label, value, onChange, options, required, className = '' }) {
      return (

            {options.map(o => <option key={typeof o === 'string' ? o : o.value} value={typeof o === 'string' ? o : o.value}>
              {typeof o === 'string' ? o : o.label}
            </option>)}
          </select>
        </div>
      );
    }

    function Textarea({ label, value, onChange, placeholder, rows = 3, required, className = '' }) {
      return (
        <div className={`flex flex-col gap-1 ${className}`}>
          {label && <label className="text-sm font-medium text-gray-700">{label}{required && <span className="text-red-500 ml-1">*</span>}</label>}

    }

    function Card({ children, className = '', onClick }) {
      return (
        <div onClick={onClick}

    function Modal({ isOpen, onClose, title, children, size = 'md' }) {
      if (!isOpen) return null;
      const sizes = { sm: 'max-w-sm', md: 'max-w-lg', lg: 'max-w-2xl', xl: 'max-w-4xl' };
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={onClose}>
          <div className="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
          <div className={`relative bg-white rounded-2xl shadow-2xl w-full ${sizes[size]} max-h-[90vh] flex flex-col slide-up`}
            onClick={e => e.stopPropagation()}>

    // ========================================
    // Ingredient Form Modal
    // ========================================
    function IngredientFormModal({ isOpen, onClose, onSave, ingredient }) {
      const [form, setForm] = useState({
        name: '', nameEn: '', category: '채소', quantity: '', unit: '개',
        addedDate: new Date().toISOString().split('T')[0], estimatedExpiry: '',
        storageMethod: '냉장', tags: []
      });
      const [errors, setErrors] = useState({});

      useEffect(() => {
        if (ingredient) {
          setForm({ ...ingredient, quantity: String(ingredient.quantity), tags: ingredient.tags || [] });
        } else {
          setForm({
            name: '', nameEn: '', category: '채소', quantity: '', unit: '개',
            addedDate: new Date().toISOString().split('T')[0], estimatedExpiry: '',
            storageMethod: '냉장', tags: []
          });
        }
        setErrors({});
      }, [ingredient, isOpen]);

      const handleSubmit = (e) => {
        e.preventDefault();
        const newErrors = {};
        if (!form.name.trim()) newErrors.name = '이름을 입력해주세요';
        if (!form.quantity) newErrors.quantity = '수량을 입력해주세요';
        if (!form.estimatedExpiry) newErrors.estimatedExpiry = '유통기한을 입력해주세요';
        if (Object.keys(newErrors).length > 0) { setErrors(newErrors); return; }
        onSave({ ...form, quantity: Number(form.quantity), id: ingredient?.id || generateId() });
        onClose();
      };

      const set = (key) => (e) => setForm(f => ({ ...f, [key]: e.target.value }));

      return (
        <Modal isOpen={isOpen} onClose={onClose} title={ingredient ? '재료 수정' : '재료 추가'} size="md">
          <form onSubmit={handleSubmit} className="space-y-4">
            <div className="grid grid-cols-2 gap-4">
              <Input label="이름" value={form.name} onChange={set('name')} placeholder="예: 양파" required error={errors.name} />
              <Input label="영문 이름" value={form.nameEn} onChange={set('nameEn')} placeholder="예: onion" />
            </div>
            <div className="grid grid-cols-3 gap-4">
              <Select label="카테고리" value={form.category} onChange={set('category')} required
                options={ALL_CATEGORIES.filter(c => c !== '전체').map(c => ({ value: c, label: `${CATEGORY_EMOJI[c] || ''} ${c}` }))} />
              <Input label="수량" type="number" value={form.quantity} onChange={set('quantity')} placeholder="0" required error={errors.quantity} min="0" step="any" />
              <Select label="단위" value={form.unit} onChange={set('unit')}
                options={['개', 'g', 'ml', '모', '통', '대', '장', '팩', '봉']} />
            </div>
            <div className="grid grid-cols-3 gap-4">
              <Select label="보관 방법" value={form.storageMethod} onChange={set('storageMethod')}
                options={[
                  { value: '냉장', label: '❄️ 냉장' },
                  { value: '냉동', label: '🧊 냉동' },
                  { value: '실온', label: '🌡️ 실온' },
                ]} />
              <Input label="추가 날짜" type="date" value={form.addedDate} onChange={set('addedDate')} />
              <Input label="유통기한" type="date" value={form.estimatedExpiry} onChange={set('estimatedExpiry')} required error={errors.estimatedExpiry} />
            </div>
            <div className="flex justify-end gap-3 pt-2">
              <Button variant="secondary" onClick={onClose}>취소</Button>
              <Button type="submit">{ingredient ? '수정' : '추가'}</Button>
            </div>
          </form>
        </Modal>
      );
    }

    // ========================================
    // Recipe Form Modal
    // ========================================
    function RecipeFormModal({ isOpen, onClose, onSave, recipe }) {
      const [form, setForm] = useState({
        recipeName: '', description: '', difficulty: '쉬움', cookingTime: '', servings: 2,
        availableIngredients: [{ name: '', amount: '' }],
        missingIngredients: [{ name: '', amount: '', essential: false }],
        steps: [{ step: 1, instruction: '', duration: '' }],
        tips: [''], matchRate: 50
      });
      const [errors, setErrors] = useState({});

      useEffect(() => {
        if (recipe) {
          setForm({
            ...recipe,
            cookingTime: String(recipe.cookingTime),
            servings: recipe.servings,
            matchRate: recipe.matchRate || 50,
            tips: recipe.tips?.length ? recipe.tips : [''],
          });
        } else {
          setForm({
            recipeName: '', description: '', difficulty: '쉬움', cookingTime: '', servings: 2,
            availableIngredients: [{ name: '', amount: '' }],
            missingIngredients: [{ name: '', amount: '', essential: false }],
            steps: [{ step: 1, instruction: '', duration: '' }],
            tips: [''], matchRate: 50
          });
        }
        setErrors({});
      }, [recipe, isOpen]);

      const set = (key) => (e) => setForm(f => ({ ...f, [key]: e.target.value }));

      const updateListItem = (listKey, index, field, value) => {
        setForm(f => {
          const list = [...f[listKey]];
          list[index] = { ...list[index], [field]: value };
          return { ...f, [listKey]: list };
        });
      };
      const addListItem = (listKey, template) => setForm(f => ({ ...f, [listKey]: [...f[listKey], template] }));
      const removeListItem = (listKey, index) => setForm(f => ({ ...f, [listKey]: f[listKey].filter((_, i) => i !== index) }));

      const handleSubmit = (e) => {
        e.preventDefault();
        const newErrors = {};
        if (!form.recipeName.trim()) newErrors.recipeName = '레시피 이름을 입력해주세요';
        if (!form.cookingTime) newErrors.cookingTime = '조리 시간을 입력해주세요';
        if (Object.keys(newErrors).length > 0) { setErrors(newErrors); return; }
        const cleaned = {
          ...form,
          id: recipe?.id || generateId(),
          cookingTime: Number(form.cookingTime),
          servings: Number(form.servings),
          matchRate: Number(form.matchRate),
          availableIngredients: form.availableIngredients.filter(i => i.name.trim()),
          missingIngredients: form.missingIngredients.filter(i => i.name.trim()),
          steps: form.steps.filter(s => s.instruction.trim()).map((s, i) => ({ ...s, step: i + 1 })),
          tips: form.tips.filter(t => t.trim()),
        };
        onSave(cleaned);
        onClose();
      };

      return (
        <Modal isOpen={isOpen} onClose={onClose} title={recipe ? '레시피 수정' : '레시피 추가'} size="lg">
          <form onSubmit={handleSubmit} className="space-y-5">
            <Input label="레시피 이름" value={form.recipeName} onChange={set('recipeName')} placeholder="예: 김치찌개" required error={errors.recipeName} />
            <Textarea label="설명" value={form.description} onChange={set('description')} placeholder="레시피에 대한 간단한 설명" />
            <div className="grid grid-cols-4 gap-4">
              <Select label="난이도" value={form.difficulty} onChange={set('difficulty')} options={['쉬움', '보통', '어려움']} />
              <Input label="조리 시간(분)" type="number" value={form.cookingTime} onChange={set('cookingTime')} required error={errors.cookingTime} min="1" />
              <Input label="인분" type="number" value={form.servings} onChange={(e) => setForm(f => ({ ...f, servings: e.target.value }))} min="1" />
              <Input label="매칭률(%)" type="number" value={form.matchRate} onChange={(e) => setForm(f => ({ ...f, matchRate: e.target.value }))} min="0" max="100" />
            </div>

            {/* Available ingredients */}
            <div>
              <label className="text-sm font-medium text-gray-700 mb-2 block">보유 재료</label>
              {form.availableIngredients.map((ing, i) => (
                <div key={i} className="flex gap-2 mb-2">
                  <input className="flex-1 px-3 py-1.5 rounded-lg border border-gray-200 text-sm" placeholder="재료명"
                    value={ing.name} onChange={e => updateListItem('availableIngredients', i, 'name', e.target.value)} />
                  <input className="w-24 px-3 py-1.5 rounded-lg border border-gray-200 text-sm" placeholder="양"
                    value={ing.amount} onChange={e => updateListItem('availableIngredients', i, 'amount', e.target.value)} />
                  {form.availableIngredients.length > 1 &&
                    <button type="button" onClick={() => removeListItem('availableIngredients', i)} className="text-red-400 hover:text-red-600 px-1">✕</button>}
                </div>
              ))}
              <button type="button" onClick={() => addListItem('availableIngredients', { name: '', amount: '' })}
                className="text-xs text-emerald-600 hover:text-emerald-700 font-medium">+ 재료 추가</button>
            </div>

            {/* Missing ingredients */}
            <div>
              <label className="text-sm font-medium text-gray-700 mb-2 block">부족한 재료</label>
              {form.missingIngredients.map((ing, i) => (
                <div key={i} className="flex gap-2 mb-2 items-center">
                  <input className="flex-1 px-3 py-1.5 rounded-lg border border-gray-200 text-sm" placeholder="재료명"
                    value={ing.name} onChange={e => updateListItem('missingIngredients', i, 'name', e.target.value)} />
                  <input className="w-24 px-3 py-1.5 rounded-lg border border-gray-200 text-sm" placeholder="양"
                    value={ing.amount} onChange={e => updateListItem('missingIngredients', i, 'amount', e.target.value)} />
                  <label className="flex items-center gap-1 text-xs text-gray-500 whitespace-nowrap">
                    <input type="checkbox" checked={ing.essential} onChange={e => updateListItem('missingIngredients', i, 'essential', e.target.checked)} /> 필수
                  </label>
                  {form.missingIngredients.length > 1 &&
                    <button type="button" onClick={() => removeListItem('missingIngredients', i)} className="text-red-400 hover:text-red-600 px-1">✕</button>}
                </div>
              ))}
              <button type="button" onClick={() => addListItem('missingIngredients', { name: '', amount: '', essential: false })}
                className="text-xs text-emerald-600 hover:text-emerald-700 font-medium">+ 재료 추가</button>
            </div>

            {/* Steps */}
            <div>
              <label className="text-sm font-medium text-gray-700 mb-2 block">조리 단계</label>
              {form.steps.map((step, i) => (
                <div key={i} className="flex gap-2 mb-2 items-start">
                  <span className="mt-2 w-6 h-6 rounded-full bg-emerald-100 text-emerald-700 text-xs flex items-center justify-center font-bold flex-shrink-0">{i+1}</span>
                  <textarea className="flex-1 px-3 py-1.5 rounded-lg border border-gray-200 text-sm resize-none" rows="2" placeholder="조리 설명"
                    value={step.instruction} onChange={e => updateListItem('steps', i, 'instruction', e.target.value)} />
                  <input className="w-16 px-2 py-1.5 rounded-lg border border-gray-200 text-sm" placeholder="시간"
                    value={step.duration} onChange={e => updateListItem('steps', i, 'duration', e.target.value)} />
                  {form.steps.length > 1 &&
                    <button type="button" onClick={() => removeListItem('steps', i)} className="text-red-400 hover:text-red-600 px-1 mt-1">✕</button>}
                </div>
              ))}
              <button type="button" onClick={() => addListItem('steps', { step: form.steps.length+1, instruction: '', duration: '' })}
                className="text-xs text-emerald-600 hover:text-emerald-700 font-medium">+ 단계 추가</button>
            </div>

            {/* Tips */}
            <div>
              <label className="text-sm font-medium text-gray-700 mb-2 block">팁</label>
              {form.tips.map((tip, i) => (
                <div key={i} className="flex gap-2 mb-2">
                  <input className="flex-1 px-3 py-1.5 rounded-lg border border-gray-200 text-sm" placeholder="조리 팁"
                    value={tip} onChange={e => { const tips = [...form.tips]; tips[i] = e.target.value; setForm(f => ({ ...f, tips })); }} />
                  {form.tips.length > 1 &&
                    <button type="button" onClick={() => setForm(f => ({ ...f, tips: f.tips.filter((_, j) => j !== i) }))} className="text-red-400 hover:text-red-600 px-1">✕</button>}
                </div>
              ))}
              <button type="button" onClick={() => setForm(f => ({ ...f, tips: [...f.tips, ''] }))}
                className="text-xs text-emerald-600 hover:text-emerald-700 font-medium">+ 팁 추가</button>
            </div>

            <div className="flex justify-end gap-3 pt-2">
              <Button variant="secondary" onClick={onClose}>취소</Button>
              <Button type="submit">{recipe ? '수정' : '추가'}</Button>
            </div>
          </form>
        </Modal>
      );
    }

              </div>
            </Card>
            <Card className="p-5">
              <div className="flex items-center justify-between">

                  <p className="text-xs text-gray-400 font-medium">유통기한 만료</p>
                  <p className={`text-3xl font-bold mt-1 ${expiredCount > 0 ? 'text-red-500' : 'text-gray-800'}`}>{expiredCount}</p>

            <Card className="p-5">

                <div>
                  <p className="text-xs text-gray-400 font-medium">총 레시피</p>

                <div className="w-12 h-12 rounded-xl bg-teal-50 flex items-center justify-center text-2xl">📖</div>

          </div>

            {/* Expiring Soon */}

              <div className="flex items-center justify-between mb-4">
                <h3 className="font-bold text-gray-800 flex items-center gap-2">
                  <span className="text-orange-500"><IconAlert size={18} /></span>
                  유통기한 임박 재료

                <Link to="/ingredients" className="text-xs text-emerald-600 hover:text-emerald-700 font-medium">전체 보기 →</Link>

                  <p className="text-sm">유통기한이 임박한 재료가 없습니다</p>

              ) : (

                  {expiringIngredients.map(ing => {
                    const days = getDaysUntilExpiry(ing.estimatedExpiry);
                    const color = days < 0 ? 'text-red-600 bg-red-50' : days <= 1 ? 'text-red-500 bg-red-50' : 'text-orange-500 bg-orange-50';
                    const label = days < 0 ? `${Math.abs(days)}일 지남` : days === 0 ? '오늘 만료' : `${days}일 남음`;
                    return (
                      <div key={ing.id} className="flex items-center justify-between p-3 rounded-xl bg-gray-50 hover:bg-gray-100 transition-colors">
                        <div className="flex items-center gap-3">
                          <span className="text-xl">{CATEGORY_EMOJI[ing.category] || '🍽️'}</span>
                          <div>
                            <p className="text-sm font-medium text-gray-700">{ing.name}</p>

                <h3 className="font-bold text-gray-800">🆕 최근 추가 재료</h3>
                <Link to="/ingredients" className="text-xs text-emerald-600 hover:text-emerald-700 font-medium">전체 보기 →</Link>
              </div>
              {recentIngredients.length === 0 ? (
                <EmptyState emoji="📭" title="재료가 없습니다" description="재료를 추가해보세요" />

                <div className="space-y-2">
                  {recentIngredients.map(ing => (
                    <div key={ing.id} className="flex items-center justify-between p-3 rounded-xl bg-gray-50">
                      <div className="flex items-center gap-3">
                        <span className="text-xl">{CATEGORY_EMOJI[ing.category] || '🍽️'}</span>
                        <div>
                          <p className="text-sm font-medium text-gray-700">{ing.name}</p>
                          <p className="text-xs text-gray-400">{ing.quantity}{ing.unit}</p>
                        </div>
                      </div>
                      <span className="text-xs text-gray-400">{formatDate(ing.addedDate)}</span>
                    </div>
                  ))}
                </div>
              )}
            </Card>
          </div>

          {/* Recommended Recipes */}
          <Card className="p-5">
            <div className="flex items-center justify-between mb-4">
              <h3 className="font-bold text-gray-800">⭐ 추천 레시피</h3>
              <Link to="/recipes" className="text-xs text-emerald-600 hover:text-emerald-700 font-medium">전체 보기 →</Link>
            </div>
            {topRecipes.length === 0 ? (
              <EmptyState emoji="📖" title="레시피가 없습니다" description="레시피를 추가해보세요" />
            ) : (
              <div className="grid sm:grid-cols-3 gap-4">
                {topRecipes.map(rec => (
                  <div key={rec.id} className="p-4 rounded-xl bg-gradient-to-br from-gray-50 to-white border border-gray-100 hover:shadow-md transition-all cursor-pointer"
                    onClick={() => navigate(`/recipe/${rec.id}`)}>
                    <div className="flex items-center justify-between mb-2">
                      <Badge color={rec.difficulty === '쉬움' ? 'green' : rec.difficulty === '보통' ? 'yellow' : 'red'}>{rec.difficulty}</Badge>
                      <span className="text-xs text-gray-400 flex items-center gap-1"><IconClock /> {rec.cookingTime}분</span>
                    </div>
                    <h4 className="font-bold text-gray-800 mb-1">{rec.recipeName}</h4>
                    <p className="text-xs text-gray-400 mb-3 line-clamp-2">{rec.description}</p>
                    <div className="flex items-center gap-2">
                      <div className="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden">
                        <div className="h-full bg-gradient-to-r from-emerald-400 to-teal-400 rounded-full progress-bar" style={{ width: `${rec.matchRate}%` }}></div>
                      </div>
                      <span className="text-xs font-bold text-emerald-600">{rec.matchRate}%</span>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </Card>
        </div>
      );
    }

    // ========================================
    // Ingredients Page
    // ========================================
    function IngredientsPage({ ingredients, setIngredients }) {
      const toast = useContext(ToastContext);
      const [search, setSearch] = useState('');
      const [category, setCategory] = useState('전체');
      const [sortBy, setSortBy] = useState('name');
      const [showForm, setShowForm] = useState(false);
      const [editItem, setEditItem] = useState(null);
      const [deleteTarget, setDeleteTarget] = useState(null);

      const filtered = useMemo(() => {
        let list = ingredients;
        if (category !== '전체') list = list.filter(i => i.category === category);
        if (search.trim()) {
          const q = search.trim().toLowerCase();
          list = list.filter(i => i.name.includes(q) || (i.nameEn && i.nameEn.toLowerCase().includes(q)));
        }
        list = [...list].sort((a, b) => {
          if (sortBy === 'name') return a.name.localeCompare(b.name, 'ko');
          if (sortBy === 'expiry') return new Date(a.estimatedExpiry) - new Date(b.estimatedExpiry);
          if (sortBy === 'added') return new Date(b.addedDate) - new Date(a.addedDate);
          return 0;
        });
        return list;
      }, [ingredients, category, search, sortBy]);

      const categories = useMemo(() => {
        const counts = {};
        ingredients.forEach(i => { counts[i.category] = (counts[i.category] || 0) + 1; });
        return ALL_CATEGORIES.filter(c => c === '전체' || counts[c]);
      }, [ingredients]);

      const handleSave = (item) => {
        setIngredients(prev => {
          const exists = prev.find(i => i.id === item.id);
          if (exists) {
            toast('재료가 수정되었습니다');
            return prev.map(i => i.id === item.id ? item : i);
          }
          toast('재료가 추가되었습니다');
          return [...prev, item];
        });
      };

      const handleDelete = () => {
        if (deleteTarget) {
          setIngredients(prev => prev.filter(i => i.id !== deleteTarget.id));
          toast('재료가 삭제되었습니다', 'info');
          setDeleteTarget(null);
        }
      };

      return (
        <div className="fade-in">
          <PageHeader title="재료 관리" subtitle={`총 ${ingredients.length}개의 재료`}
            action={<Button onClick={() => { setEditItem(null); setShowForm(true); }}><IconPlus size={16} /> 재료 추가</Button>} />

          {/* Search and Sort */}
          <div className="flex flex-col sm:flex-row gap-3 mb-4">
            <div className="relative flex-1">
              <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><IconSearch size={16} /></span>
              <input type="text" value={search} onChange={e => setSearch(e.target.value)}
                placeholder="재료 검색..." className="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent bg-white" />
            </div>
            <select value={sortBy} onChange={e => setSortBy(e.target.value)}
              className="px-4 py-2.5 rounded-xl border border-gray-200 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-emerald-400">
              <option value="name">이름순</option>
              <option value="expiry">유통기한순</option>
              <option value="added">최근 추가순</option>
            </select>
          </div>

          {/* Category Tabs */}
          <div className="flex gap-2 mb-6 overflow-x-auto pb-2 scrollbar-hide">
            {categories.map(cat => (
              <button key={cat} onClick={() => setCategory(cat)}
                className={`px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap transition-all ${
                  category === cat ? 'bg-emerald-500 text-white shadow-md' : 'bg-white text-gray-500 hover:bg-gray-50 border border-gray-200'
                }`}>
                {cat !== '전체' && <span className="mr-1">{CATEGORY_EMOJI[cat]}</span>}{cat}
              </button>
            ))}
          </div>

          {/* Ingredients Grid */}
          {filtered.length === 0 ? (
            <EmptyState emoji="🔍" title="재료를 찾을 수 없습니다" description="다른 검색어나 카테고리를 시도해보세요" />
          ) : (
            <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
              {filtered.map(ing => {
                const days = getDaysUntilExpiry(ing.estimatedExpiry);
                const expiryColor = days < 0 ? 'text-red-600' : days <= 1 ? 'text-red-500' : days <= 3 ? 'text-orange-500' : 'text-gray-500';
                const expiryBg = days < 0 ? 'bg-red-50 border-red-200' : days <= 1 ? 'bg-red-50 border-red-100' : days <= 3 ? 'bg-orange-50 border-orange-100' : '';
                const expiryLabel = days < 0 ? `${Math.abs(days)}일 지남` : days === 0 ? '오늘 만료' : `D-${days}`;
                return (
                  <Card key={ing.id} className={`p-4 ${expiryBg}`} onClick={() => { setEditItem(ing); setShowForm(true); }}>
                    <div className="flex items-start justify-between">
                      <div className="flex items-center gap-3">
                        <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-gray-50 to-white border border-gray-100 flex items-center justify-center text-2xl">
                          {CATEGORY_EMOJI[ing.category] || '🍽️'}
                        </div>
                        <div>
                          <h4 className="font-bold text-gray-800">{ing.name}</h4>
                          {ing.nameEn && <p className="text-xs text-gray-400">{ing.nameEn}</p>}
                        </div>
                      </div>
                      <button onClick={(e) => { e.stopPropagation(); setDeleteTarget(ing); }}
                        className="p-1.5 rounded-lg hover:bg-red-50 text-gray-300 hover:text-red-500 transition-colors">
                        <IconTrash size={14} />
                      </button>
                    </div>
                    <div className="mt-3 flex items-center gap-2 flex-wrap">
                      <Badge color="teal">{ing.quantity}{ing.unit}</Badge>
                      <Badge color="blue">{STORAGE_EMOJI[ing.storageMethod]} {ing.storageMethod}</Badge>
                      <span className={`px-2 py-0.5 rounded-full text-xs font-bold ${expiryColor} ${days <= 3 ? (days < 0 ? 'bg-red-100' : days <= 1 ? 'bg-red-100' : 'bg-orange-100') : 'bg-gray-100'}`}>
                        {expiryLabel}
                      </span>
                    </div>
                    <p className="text-xs text-gray-400 mt-2">유통기한: {formatDate(ing.estimatedExpiry)}</p>
                  </Card>
                );
              })}
            </div>
          )}

          <IngredientFormModal isOpen={showForm} onClose={() => setShowForm(false)} onSave={handleSave} ingredient={editItem} />
          <ConfirmDialog isOpen={!!deleteTarget} title="재료 삭제" message={`"${deleteTarget?.name}"을(를) 삭제하시겠습니까?`}
            onConfirm={handleDelete} onCancel={() => setDeleteTarget(null)} />
        </div>
      );
    }

    // ========================================
    // Recipes Page
    // ========================================
    function RecipesPage({ recipes, setRecipes }) {
      const toast = useContext(ToastContext);
      const { navigate } = useRouter();
      const [difficulty, setDifficulty] = useState('전체');
      const [showForm, setShowForm] = useState(false);
      const [editItem, setEditItem] = useState(null);
      const [deleteTarget, setDeleteTarget] = useState(null);

      const filtered = useMemo(() => {
        let list = recipes;
        if (difficulty !== '전체') list = list.filter(r => r.difficulty === difficulty);
        return [...list].sort((a, b) => b.matchRate - a.matchRate);
      }, [recipes, difficulty]);

      const handleSave = (item) => {
        setRecipes(prev => {
          const exists = prev.find(r => r.id === item.id);
          if (exists) {
            toast('레시피가 수정되었습니다');
            return prev.map(r => r.id === item.id ? item : r);
          }
          toast('레시피가 추가되었습니다');
          return [...prev, item];
        });
      };

      const handleDelete = () => {
        if (deleteTarget) {
          setRecipes(prev => prev.filter(r => r.id !== deleteTarget.id));
          toast('레시피가 삭제되었습니다', 'info');
          setDeleteTarget(null);
        }
      };

      return (
        <div className="fade-in">
          <PageHeader title="레시피" subtitle={`총 ${recipes.length}개의 레시피`}
            action={<Button onClick={() => { setEditItem(null); setShowForm(true); }}><IconPlus size={16} /> 레시피 추가</Button>} />

          {/* Difficulty Filter */}
          <div className="flex gap-2 mb-6">
            {['전체', '쉬움', '보통', '어려움'].map(d => (
              <button key={d} onClick={() => setDifficulty(d)}
                className={`px-4 py-2 rounded-full text-sm font-medium transition-all ${
                  difficulty === d ? 'bg-emerald-500 text-white shadow-md' : 'bg-white text-gray-500 hover:bg-gray-50 border border-gray-200'
                }`}>
                {d}
              </button>
            ))}
          </div>

          {filtered.length === 0 ? (
            <EmptyState emoji="📖" title="레시피가 없습니다" description="새 레시피를 추가해보세요" />
          ) : (
            <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
              {filtered.map(rec => (
                <Card key={rec.id} className="p-5 flex flex-col" onClick={() => navigate(`/recipe/${rec.id}`)}>
                  <div className="flex items-center justify-between mb-3">
                    <Badge color={rec.difficulty === '쉬움' ? 'green' : rec.difficulty === '보통' ? 'yellow' : 'red'}>{rec.difficulty}</Badge>
                    <div className="flex items-center gap-3 text-xs text-gray-400">
                      <span className="flex items-center gap-1"><IconClock /> {rec.cookingTime}분</span>
                      <span className="flex items-center gap-1"><IconUsers /> {rec.servings}인분</span>
                    </div>
                  </div>
                  <h4 className="text-lg font-bold text-gray-800 mb-1">{rec.recipeName}</h4>
                  <p className="text-sm text-gray-400 mb-4 line-clamp-2 flex-1">{rec.description}</p>
                  <div className="flex flex-wrap gap-1 mb-3">
                    {rec.availableIngredients?.slice(0, 4).map((ing, i) => (
                      <span key={i} className="px-2 py-0.5 rounded-md bg-emerald-50 text-emerald-700 text-xs">{ing.name}</span>
                    ))}
                    {rec.availableIngredients?.length > 4 && <span className="px-2 py-0.5 rounded-md bg-gray-50 text-gray-400 text-xs">+{rec.availableIngredients.length - 4}</span>}
                  </div>
                  <div className="flex items-center gap-2">
                    <span className="text-xs text-gray-400">매칭률</span>
                    <div className="flex-1 h-2.5 bg-gray-200 rounded-full overflow-hidden">
                      <div className={`h-full rounded-full progress-bar ${rec.matchRate >= 80 ? 'bg-gradient-to-r from-emerald-400 to-emerald-500' : rec.matchRate >= 50 ? 'bg-gradient-to-r from-yellow-400 to-orange-400' : 'bg-gradient-to-r from-red-400 to-red-500'}`}
                        style={{ width: `${rec.matchRate}%` }}></div>
                    </div>
                    <span className={`text-sm font-bold ${rec.matchRate >= 80 ? 'text-emerald-600' : rec.matchRate >= 50 ? 'text-orange-500' : 'text-red-500'}`}>{rec.matchRate}%</span>
                  </div>
                  <div className="flex justify-end mt-3 gap-2">
                    <button onClick={(e) => { e.stopPropagation(); setEditItem(rec); setShowForm(true); }}
                      className="p-1.5 rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors"><IconEdit /></button>
                    <button onClick={(e) => { e.stopPropagation(); setDeleteTarget(rec); }}
                      className="p-1.5 rounded-lg hover:bg-red-50 text-gray-300 hover:text-red-500 transition-colors"><IconTrash /></button>
                  </div>

              ))}

          <RecipeFormModal isOpen={showForm} onClose={() => setShowForm(false)} onSave={handleSave} recipe={editItem} />
          <ConfirmDialog isOpen={!!deleteTarget} title="레시피 삭제" message={`"${deleteTarget?.recipeName}"을(를) 삭제하시겠습니까?`}
            onConfirm={handleDelete} onCancel={() => setDeleteTarget(null)} />
        </div>
      );
    }

    // ========================================
    // Recipe Detail Page
    // ========================================
    function RecipeDetailPage({ recipes, setRecipes }) {
      const toast = useContext(ToastContext);
      const { path, navigate } = useRouter();
      const params = matchRoute('/recipe/:id', path);
      const recipe = params ? recipes.find(r => r.id === params.id) : null;
      const [showForm, setShowForm] = useState(false);
      const [showDelete, setShowDelete] = useState(false);

      if (!recipe) {
        return (
          <div className="fade-in">
            <EmptyState emoji="🔍" title="레시피를 찾을 수 없습니다" description="존재하지 않는 레시피입니다" />
            <div className="text-center mt-4">
              <Button variant="secondary" onClick={() => navigate('/recipes')}>← 레시피 목록으로</Button>
            </div>
          </div>
        );

        setRecipes(prev => prev.map(r => r.id === item.id ? item : r));
        toast('레시피가 수정되었습니다');
      };

      const handleDelete = () => {
        setRecipes(prev => prev.filter(r => r.id !== recipe.id));
        toast('레시피가 삭제되었습니다', 'info');
        navigate('/recipes');
      };

      return (
        <div className="fade-in max-w-3xl mx-auto">
          {/* Back button */}
          <button onClick={() => navigate('/recipes')} className="flex items-center gap-2 text-sm text-gray-500 hover:text-gray-700 mb-4 transition-colors">
            <IconArrowLeft size={16} /> 레시피 목록
          </button>

          {/* Header */}
          <Card className="p-6 mb-6">
            <div className="flex items-start justify-between mb-4">
              <div>
                <div className="flex items-center gap-2 mb-2">
                  <Badge color={recipe.difficulty === '쉬움' ? 'green' : recipe.difficulty === '보통' ? 'yellow' : 'red'}>{recipe.difficulty}</Badge>
                  <span className="text-sm text-gray-400 flex items-center gap-1"><IconClock /> {recipe.cookingTime}분</span>

                </div>
                <h2 className="text-2xl font-bold text-gray-800">{recipe.recipeName}</h2>
                <p className="text-sm text-gray-500 mt-2">{recipe.description}</p>

              </div>
            </div>
            {/* Match Rate */}
            <div className="flex items-center gap-3 p-3 rounded-xl bg-gray-50">
              <span className="text-sm font-medium text-gray-600">재료 매칭률</span>
              <div className="flex-1 h-3 bg-gray-200 rounded-full overflow-hidden">
                <div className={`h-full rounded-full progress-bar ${recipe.matchRate >= 80 ? 'bg-gradient-to-r from-emerald-400 to-emerald-500' : recipe.matchRate >= 50 ? 'bg-gradient-to-r from-yellow-400 to-orange-400' : 'bg-gradient-to-r from-red-400 to-red-500'}`}
                  style={{ width: `${recipe.matchRate}%` }}></div>
              </div>
              <span className="text-lg font-bold text-emerald-600">{recipe.matchRate}%</span>
            </div>
          </Card>

          {/* Ingredients */}
          <div className="grid sm:grid-cols-2 gap-4 mb-6">
            <Card className="p-5">
              <h3 className="font-bold text-gray-800 mb-3 flex items-center gap-2">
                <span className="text-emerald-500"><IconCheck size={18} /></span> 보유 재료
              </h3>
              <div className="space-y-2">
                {recipe.availableIngredients?.map((ing, i) => (
                  <div key={i} className="flex items-center gap-2 p-2 rounded-lg bg-emerald-50">
                    <span className="w-5 h-5 rounded-full bg-emerald-500 text-white flex items-center justify-center"><IconCheck size={12} /></span>
                    <span className="text-sm text-gray-700 flex-1">{ing.name}</span>
                    <span className="text-xs text-gray-400">{ing.amount}</span>
                  </div>
                ))}
              </div>
            </Card>
            <Card className="p-5">
              <h3 className="font-bold text-gray-800 mb-3 flex items-center gap-2">
                <span className="text-orange-500">📋</span> 부족한 재료
              </h3>
              {recipe.missingIngredients?.length === 0 ? (
                <p className="text-sm text-gray-400 text-center py-4">모든 재료를 보유하고 있습니다!</p>
              ) : (
                <div className="space-y-2">
                  {recipe.missingIngredients?.map((ing, i) => (
                    <div key={i} className="flex items-center gap-2 p-2 rounded-lg bg-orange-50">
                      <span className="w-5 h-5 rounded-full bg-gray-300 text-white flex items-center justify-center text-xs">?</span>
                      <span className="text-sm text-gray-700 flex-1">{ing.name}</span>
                      <span className="text-xs text-gray-400">{ing.amount}</span>
                      {ing.essential ? <Badge color="red">필수</Badge> : <Badge color="gray">선택</Badge>}
                    </div>
                  ))}
                </div>
              )}
            </Card>
          </div>

          {/* Steps */}
          <Card className="p-5 mb-6">
            <h3 className="font-bold text-gray-800 mb-4">📝 조리 단계</h3>
            <div className="space-y-4">
              {recipe.steps?.map((step, i) => (
                <div key={i} className="flex gap-4">
                  <div className="flex flex-col items-center">
                    <div className="w-8 h-8 rounded-full bg-gradient-to-br from-emerald-400 to-teal-500 text-white flex items-center justify-center text-sm font-bold shadow-sm">
                      {step.step}
                    </div>
                    {i < recipe.steps.length - 1 && <div className="w-0.5 flex-1 bg-gray-200 mt-2"></div>}
                  </div>
                  <div className="flex-1 pb-4">
                    <p className="text-sm text-gray-700 leading-relaxed">{step.instruction}</p>
                    {step.duration && <span className="inline-flex items-center gap-1 mt-2 text-xs text-gray-400"><IconClock size={12} /> {step.duration}</span>}
                  </div>
                </div>
              ))}
            </div>
          </Card>

          {/* Tips */}
          {recipe.tips?.length > 0 && (
            <Card className="p-5">
              <h3 className="font-bold text-gray-800 mb-3">💡 조리 팁</h3>
              <div className="space-y-2">
                {recipe.tips.map((tip, i) => (
                  <div key={i} className="flex gap-2 p-3 rounded-xl bg-amber-50">
                    <span className="text-amber-500 flex-shrink-0 mt-0.5">•</span>
                    <p className="text-sm text-gray-600">{tip}</p>
                  </div>
                ))}
              </div>
            </Card>
          )}

          <RecipeFormModal isOpen={showForm} onClose={() => setShowForm(false)} onSave={handleSave} recipe={recipe} />
          <ConfirmDialog isOpen={showDelete} title="레시피 삭제" message={`"${recipe.recipeName}"을(를) 삭제하시겠습니까?`}
            onConfirm={handleDelete} onCancel={() => setShowDelete(false)} />
        </div>
      );
    }

    // ========================================
    // App Component
    // ========================================
    function App() {
      const [data, setData] = useState(() => loadData());

      const ingredients = data.ingredients;
      const recipes = data.recipes;

      const setIngredients = useCallback((updater) => {
        setData(prev => {
          const newIngredients = typeof updater === 'function' ? updater(prev.ingredients) : updater;
          return { ...prev, ingredients: newIngredients };
        });
      }, []);

      const setRecipes = useCallback((updater) => {
        setData(prev => {
          const newRecipes = typeof updater === 'function' ? updater(prev.recipes) : updater;
          return { ...prev, recipes: newRecipes };
        });
      }, []);

      useEffect(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }, [data]);

      return (
        <ToastProvider>
          <Router>
            <div className="flex min-h-screen">
              <Sidebar />
              <main className="flex-1 p-4 md:p-8 pb-24 md:pb-8 max-w-6xl w-full mx-auto">
                <AppRoutes ingredients={ingredients} recipes={recipes} setIngredients={setIngredients} setRecipes={setRecipes} />
              </main>
              <BottomNav />
            </div>
          </Router>
        </ToastProvider>
      );
    }

    function AppRoutes({ ingredients, recipes, setIngredients, setRecipes }) {
      const { path } = useRouter();

      if (path === '/' || path === '') return <DashboardPage ingredients={ingredients} recipes={recipes} />;
      if (path === '/ingredients') return <IngredientsPage ingredients={ingredients} setIngredients={setIngredients} />;
      if (path === '/recipes') return <RecipesPage recipes={recipes} setRecipes={setRecipes} />;
      if (matchRoute('/recipe/:id', path)) return <RecipeDetailPage recipes={recipes} setRecipes={setRecipes} />;

      return <EmptyState emoji="🚧" title="페이지를 찾을 수 없습니다" description="올바른 경로로 이동해주세요" />;
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
