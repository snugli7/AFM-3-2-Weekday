<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API 테스터</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      animation: spin 0.8s linear infinite;
    }
    @keyframes pulse-border {
      0%, 100% { border-color: #6366f1; box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
      50% { border-color: #818cf8; box-shadow: 0 0 12px 4px rgba(99, 102, 241, 0.15); }
    }
    .pulse-highlight {
      animation: pulse-border 2s ease-in-out infinite;
    }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useCallback } = React;

    // ========================================
    // Design System Components
    // ========================================

    function Card({ children, className = "" }) {
      return (
        <div className={`bg-gray-900 border border-gray-800 rounded-xl p-5 ${className}`}>
          {children}
        </div>
      );
    }

    function Button({ children, onClick, variant = "primary", size = "md", disabled = false, className = "" }) {
      const baseClasses = "font-semibold rounded-lg transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-950 disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer";
      const variants = {
        primary: "bg-indigo-600 hover:bg-indigo-500 text-white focus:ring-indigo-500",
        secondary: "bg-gray-700 hover:bg-gray-600 text-gray-100 focus:ring-gray-500",
        success: "bg-emerald-600 hover:bg-emerald-500 text-white focus:ring-emerald-500",
        danger: "bg-red-600 hover:bg-red-500 text-white focus:ring-red-500",
        ghost: "bg-transparent hover:bg-gray-800 text-gray-300 focus:ring-gray-600 border border-gray-700",
      };
      const sizes = {
        sm: "px-3 py-1.5 text-sm",
        md: "px-4 py-2.5 text-sm",
        lg: "px-6 py-3 text-base",
      };
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          className={`${baseClasses} ${variants[variant]} ${sizes[size]} ${className}`}
        >
          {children}
        </button>
      );
    }

    function Spinner() {
      return (
        <div className="flex items-center justify-center py-8">
          <div className="spinner w-8 h-8 border-3 border-indigo-400 border-t-transparent rounded-full" style={{ borderWidth: '3px' }}></div>
          <span className="ml-3 text-gray-400 text-sm">요청 중...</span>
        </div>
      );
    }

    function StatusBadge({ status, time }) {
      const color = status >= 200 && status < 300
        ? "bg-emerald-900/50 text-emerald-400 border-emerald-700"
        : status >= 400
        ? "bg-red-900/50 text-red-400 border-red-700"
        : "bg-yellow-900/50 text-yellow-400 border-yellow-700";
      return (
        <div className="flex items-center gap-3 mb-3">
          <span className={`px-2.5 py-1 text-xs font-mono font-bold rounded border ${color}`}>
            {status}
          </span>
          <span className="text-xs text-gray-500">{time}ms</span>
        </div>
      );
    }

    function JsonBlock({ data }) {
      const formatted = JSON.stringify(data, null, 2);
      return (
        <pre className="bg-gray-950 border border-gray-800 rounded-lg p-4 overflow-x-auto text-xs font-mono text-gray-300 max-h-72 overflow-y-auto">
          <code>{formatted}</code>
        </pre>
      );
    }

    // ========================================
    // Greeting Card Component
    // ========================================

    function GreetingCard({ data }) {
      if (!data || !data.greeting) return null;
      return (
        <div className="bg-gradient-to-br from-indigo-900/40 to-purple-900/30 border border-indigo-700/50 rounded-xl p-6 mb-4">
          <p className="text-2xl font-bold text-indigo-200 mb-3">{data.greeting}</p>
          {data.currentTime && (
            <div className="flex items-center gap-2 text-gray-300">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              <span className="text-sm font-mono">{data.currentTime}</span>
            </div>
          )}
          {data.timestamp && (
            <p className="text-xs text-gray-500 mt-2">timestamp: {data.timestamp}</p>
          )}
        </div>
      );
    }

    // ========================================
    // Dog Image Preview
    // ========================================

    function DogImage({ url }) {
      if (!url) return null;
      return (
        <div className="mb-4">
          <img src={url} alt="Random dog" className="rounded-xl max-h-64 object-cover border border-gray-700" />
        </div>
      );
    }

    // ========================================
    // API Result Display
    // ========================================

    function ApiResult({ result }) {
      if (!result) return null;
      const { loading, error, data, status, time, type } = result;

      if (loading) return <Spinner />;

      if (error) {
        return (
          <div className="bg-red-950/30 border border-red-800 rounded-xl p-4 mt-4">
            <p className="text-red-400 font-semibold text-sm">오류 발생</p>
            <p className="text-red-300 text-xs mt-1 font-mono">{error}</p>
          </div>
        );
      }

      if (!data) return null;

      return (
        <div className="mt-4">
          <StatusBadge status={status} time={time} />
          {type === "greeting" && <GreetingCard data={data} />}
          {type === "dog" && data.message && <DogImage url={data.message} />}
          <details open={type !== "greeting" && type !== "dog"}>
            <summary className="text-xs text-gray-500 cursor-pointer hover:text-gray-300 mb-2">
              JSON 응답 보기
            </summary>
            <JsonBlock data={data} />
          </details>
        </div>
      );
    }

    // ========================================
    // Preset API Buttons Section
    // ========================================

    const PRESETS = [
      {
        id: "greeting",
        label: "인사 + 현재시간",
        emoji: "🎉",
        url: "http://localhost:3000/api/greeting",
        type: "greeting",
        description: "우리 서버 - 인사 메시지와 현재 시간",
      },
      {
        id: "user",
        label: "랜덤 유저",
        emoji: "👤",
        url: "https://randomuser.me/api/",
        type: "user",
        description: "무작위 사용자 정보 생성",
      },
      {
        id: "dog",
        label: "랜덤 강아지 사진",
        emoji: "🐶",
        url: "https://dog.ceo/api/breeds/image/random",
        type: "dog",
        description: "귀여운 강아지 사진 랜덤 표시",
      },
      {
        id: "post",
        label: "JSONPlaceholder 포스트",
        emoji: "📝",
        url: "https://jsonplaceholder.typicode.com/posts/1",
        type: "post",
        description: "테스트용 게시글 데이터",
      },
    ];

    function PresetSection() {
      const [results, setResults] = useState({});

      const callApi = useCallback(async (preset) => {
        setResults(prev => ({ ...prev, [preset.id]: { loading: true } }));
        const start = performance.now();
        try {
          const res = await fetch(preset.url);
          const data = await res.json();
          const time = Math.round(performance.now() - start);
          setResults(prev => ({
            ...prev,
            [preset.id]: { data, status: res.status, time, type: preset.type },
          }));
        } catch (err) {
          const time = Math.round(performance.now() - start);
          setResults(prev => ({
            ...prev,
            [preset.id]: { error: err.message, time, type: preset.type },
          }));
        }
      }, []);

      return (
        <div className="space-y-4">
          <h2 className="text-lg font-bold text-gray-200">미리 설정된 API</h2>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {PRESETS.map((preset, idx) => {
              const isGreeting = preset.id === "greeting";
              return (
                <Card
                  key={preset.id}
                  className={
                    isGreeting
                      ? "md:col-span-2 border-2 border-indigo-500 pulse-highlight bg-gradient-to-r from-gray-900 to-indigo-950/30"
                      : ""
                  }
                >
                  <div className="flex items-start justify-between gap-3">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 mb-1">
                        <span className="text-xl">{preset.emoji}</span>
                        <h3 className={`font-bold ${isGreeting ? "text-indigo-300 text-lg" : "text-gray-200"}`}>
                          {preset.label}
                        </h3>
                        {isGreeting && (
                          <span className="text-[10px] bg-indigo-600 text-indigo-100 px-1.5 py-0.5 rounded font-semibold uppercase tracking-wider">
                            Our Server
                          </span>
                        )}
                      </div>
                      <p className="text-xs text-gray-500 mb-1">{preset.description}</p>
                      <p className="text-[11px] text-gray-600 font-mono truncate">{preset.url}</p>
                    </div>
                    <Button
                      onClick={() => callApi(preset)}
                      variant={isGreeting ? "primary" : "ghost"}
                      size={isGreeting ? "lg" : "md"}
                      disabled={results[preset.id]?.loading}
                    >
                      호출
                    </Button>
                  </div>
                  <ApiResult result={results[preset.id]} />
                </Card>
              );
            })}
          </div>
        </div>
      );
    }

    // ========================================
    // Custom API Section
    // ========================================

    function CustomSection() {
      const [url, setUrl] = useState("");
      const [method, setMethod] = useState("GET");
      const [body, setBody] = useState("");
      const [result, setResult] = useState(null);

      const sendRequest = useCallback(async () => {
        if (!url.trim()) return;
        setResult({ loading: true });
        const start = performance.now();
        try {
          const options = { method };
          if ((method === "POST" || method === "PUT") && body.trim()) {
            options.headers = { "Content-Type": "application/json" };
            options.body = body;
          }
          const res = await fetch(url, options);
          const contentType = res.headers.get("content-type") || "";
          let data;
          if (contentType.includes("application/json")) {
            data = await res.json();
          } else {
            data = { _rawText: await res.text() };
          }
          const time = Math.round(performance.now() - start);
          setResult({ data, status: res.status, time, type: "custom" });
        } catch (err) {
          const time = Math.round(performance.now() - start);
          setResult({ error: err.message, time, type: "custom" });
        }
      }, [url, method, body]);

      const showBody = method === "POST" || method === "PUT";

      return (
        <div className="space-y-4">
          <h2 className="text-lg font-bold text-gray-200">커스텀 API 호출</h2>
          <Card>
            <div className="space-y-3">
              <div className="flex flex-col sm:flex-row gap-3">
                <select
                  value={method}
                  onChange={e => setMethod(e.target.value)}
                  className="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-sm font-mono text-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 sm:w-32"
                >
                  <option>GET</option>
                  <option>POST</option>
                  <option>PUT</option>
                  <option>DELETE</option>
                </select>
                <input
                  type="text"
                  value={url}
                  onChange={e => setUrl(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && sendRequest()}
                  placeholder="https://api.example.com/data"
                  className="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm font-mono text-gray-200 placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                />
                <Button onClick={sendRequest} disabled={!url.trim() || result?.loading}>
                  전송
                </Button>
              </div>
              {showBody && (
                <div>
                  <label className="block text-xs text-gray-500 mb-1">요청 본문 (JSON)</label>
                  <textarea
                    value={body}
                    onChange={e => setBody(e.target.value)}
                    rows={4}
                    placeholder='{ "key": "value" }'
                    className="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm font-mono text-gray-200 placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-y"
                  />
                </div>
              )}
            </div>
            <ApiResult result={result} />
          </Card>
        </div>
      );
    }

    // ========================================
    // App Component
    // ========================================

    function App() {
      return (
        <div className="max-w-4xl mx-auto px-4 py-8">
          <header className="mb-8">
            <h1 className="text-3xl font-extrabold text-white tracking-tight">
              <span className="text-indigo-400">API</span> 테스터
            </h1>
            <p className="text-sm text-gray-500 mt-1">다양한 API를 호출하고 응답을 확인하세요</p>
          </header>

          <main className="space-y-10">
            <PresetSection />
            <CustomSection />
          </main>

          <footer className="mt-12 text-center text-xs text-gray-700 pb-4">
            API Tester &mdash; Built with React 18 + Tailwind CSS
          </footer>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
