<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마음 쉼터 - 심리 상담 챗봇</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Noto Sans KR', 'sans-serif'],
          },
          colors: {
            calm: {
              50: '#f5f3ff',
              100: '#ede9fe',
              200: '#ddd6fe',
              300: '#c4b5fd',
              400: '#a78bfa',
              500: '#8b5cf6',
            },
            sage: {
              50: '#f0fdf4',
              100: '#dcfce7',
              200: '#bbf7d0',
              300: '#86efac',
            },
            warm: {
              50: '#fff7ed',
              100: '#ffedd5',
              200: '#fed7aa',
            },
            lavender: {
              50: '#faf5ff',
              100: '#f3e8ff',
              200: '#e9d5ff',
              300: '#d8b4fe',
              400: '#c084fc',
              500: '#a855f7',
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(145deg, #f3e8ff 0%, #f0fdf4 40%, #fff7ed 70%, #ede9fe 100%);
      min-height: 100vh;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes dotPulse {
      0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
      30% { opacity: 1; transform: scale(1.1); }
    }

    @keyframes gentlePulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .message-enter { animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    .typing-dot:nth-child(1) { animation: dotPulse 1.4s infinite 0s; }
    .typing-dot:nth-child(2) { animation: dotPulse 1.4s infinite 0.2s; }
    .typing-dot:nth-child(3) { animation: dotPulse 1.4s infinite 0.4s; }

    .online-dot { animation: gentlePulse 2s infinite ease-in-out; }

    .scrollbar-thin::-webkit-scrollbar { width: 4px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #e9d5ff; border-radius: 9999px; }

    .chat-input:focus { box-shadow: 0 0 0 3px rgba(196, 181, 253, 0.3); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useEffect, useRef, useCallback } = React;

    // ========================================
    // Counselor Response Engine (Simulated AI)
    // ========================================
    const WELCOME_MESSAGE = "안녕하세요, 마음 쉼터에 오신 것을 환영합니다. 저는 당신의 이야기를 들어드리는 상담사입니다. 오늘 기분은 어떠세요? 편하게 이야기해 주세요. 여기는 당신만을 위한 안전한 공간이에요.";

    async function getCounselorResponse(allMessages) {
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: allMessages }),
        });
        const data = await res.json();
        if (data.success) return data.data.text;
        console.error('API error:', data.message);
        return '죄송합니다, 잠시 연결에 문제가 생겼어요. 다시 한 번 말씀해 주시겠어요?';
      } catch (err) {
        console.error('Fetch error:', err);
        return '죄송합니다, 연결에 문제가 생겼어요. 잠시 후 다시 시도해 주세요.';
      }
    }

    // ========================================
    // Utility: Format Time
    // ========================================
    function formatTime(date) {
      return date.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: true });
    }

    // ========================================
    // Design System: Counselor Avatar
    // ========================================
    function CounselorAvatar({ size = 'md' }) {
      const sizeClasses = { sm: 'w-9 h-9', md: 'w-11 h-11', lg: 'w-14 h-14' };
      const iconSize = { sm: 'w-4 h-4', md: 'w-5 h-5', lg: 'w-7 h-7' };
      return (
        <div className={`${sizeClasses[size]} rounded-full bg-gradient-to-br from-lavender-300 via-calm-300 to-sage-200 flex items-center justify-center flex-shrink-0 shadow-md`}>
          <svg className={`${iconSize[size]} text-white`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
          </svg>
        </div>
      );
    }

    // ========================================
    // Design System: Typing Indicator
    // ========================================
    function TypingIndicator() {
      return (
        <div className="flex items-end gap-2.5 message-enter">
          <CounselorAvatar size="sm" />
          <div className="bg-white/80 backdrop-blur-sm rounded-2xl rounded-bl-md px-5 py-3 shadow-sm">
            <div className="flex gap-1.5 items-center h-5">
              <span className="typing-dot w-2 h-2 bg-calm-400 rounded-full inline-block"></span>
              <span className="typing-dot w-2 h-2 bg-calm-300 rounded-full inline-block"></span>
              <span className="typing-dot w-2 h-2 bg-calm-200 rounded-full inline-block"></span>
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // Design System: Chat Bubble
    // ========================================
    function ChatBubble({ message }) {
      const isUser = message.sender === 'user';
      return (
        <div className={`flex items-end gap-2.5 message-enter ${isUser ? 'justify-end' : 'justify-start'}`}>
          {!isUser && <CounselorAvatar size="sm" />}
          <div className="max-w-[78%] sm:max-w-[65%]">
            {!isUser && (
              <p className="text-[11px] text-gray-400 mb-1 ml-1 font-medium">마음 쉼터 상담사</p>
            )}
            <div className={`rounded-2xl px-4 py-3 shadow-sm leading-relaxed text-[15px] whitespace-pre-wrap ${
              isUser
                ? 'bg-gradient-to-r from-calm-400 to-calm-500 text-white rounded-br-md'
                : 'bg-white/80 backdrop-blur-sm text-gray-700 rounded-bl-md border border-white/60'
            }`}>
              {message.text}
            </div>
            <p className={`text-[11px] text-gray-400 mt-1 px-1 ${isUser ? 'text-right' : 'text-left'}`}>
              {formatTime(message.timestamp)}
            </p>
          </div>
        </div>
      );
    }

    // ========================================
    // Design System: Suggestion Chips
    // ========================================
    function SuggestionChips({ onSelect }) {
      const chips = [
        '요즘 마음이 힘들어요',
        '불안한 감정이 들어요',
        '잠이 잘 안 와요',
        '직장 스트레스가 커요',
        '외로운 느낌이 들어요',
        '기분이 좋아요!'
      ];
      return (
        <div className="px-4 pb-3 flex flex-wrap gap-2 message-enter">
          {chips.map((chip) => (
            <button
              key={chip}
              onClick={() => onSelect(chip)}
              className="text-xs bg-white/70 backdrop-blur-sm text-calm-500 border border-calm-200 rounded-full px-3.5 py-2 hover:bg-calm-50 hover:border-calm-300 hover:shadow-sm transition-all active:scale-95"
            >
              {chip}
            </button>
          ))}
        </div>
      );
    }

    // ========================================
    // App Component
    // ========================================
    function App() {
      const [messages, setMessages] = useState([
        {
          id: 1,
          sender: 'counselor',
          text: WELCOME_MESSAGE,
          timestamp: new Date(),
        }
      ]);
      const [input, setInput] = useState('');
      const [isTyping, setIsTyping] = useState(false);
      const [showChips, setShowChips] = useState(true);
      const messagesEndRef = useRef(null);
      const inputRef = useRef(null);

      const scrollToBottom = useCallback(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, []);

      useEffect(() => {
        scrollToBottom();
      }, [messages, isTyping, scrollToBottom]);

      const sendMessage = useCallback(async (text) => {
        const trimmed = text.trim();
        if (!trimmed || isTyping) return;

        setShowChips(false);

        const userMessage = {
          id: Date.now(),
          sender: 'user',
          text: trimmed,
          timestamp: new Date(),
        };

        const updatedMessages = [...messages, userMessage];
        setMessages(updatedMessages);
        setInput('');
        setIsTyping(true);

        const responseText = await getCounselorResponse(updatedMessages);
        const counselorMessage = {
          id: Date.now() + 1,
          sender: 'counselor',
          text: responseText,
          timestamp: new Date(),
        };
        setIsTyping(false);
        setMessages(prev => [...prev, counselorMessage]);
      }, [isTyping, messages]);

      const handleSend = useCallback(() => {
        sendMessage(input);
      }, [input, sendMessage]);

      const handleKeyDown = useCallback((e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      }, [handleSend]);

      const handleChipClick = useCallback((chip) => {
        sendMessage(chip);
      }, [sendMessage]);

      return (
        <div className="flex flex-col h-screen max-w-lg mx-auto bg-white/20 backdrop-blur-sm sm:shadow-2xl">
          {/* Header */}
          <header className="bg-gradient-to-r from-calm-400 via-lavender-400 to-calm-500 text-white px-5 py-4 flex items-center gap-3 shadow-lg flex-shrink-0">
            <div className="w-11 h-11 rounded-full bg-white/20 flex items-center justify-center backdrop-blur-sm ring-2 ring-white/30">
              <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
              </svg>
            </div>
            <div className="flex-1">
              <h1 className="text-lg font-semibold tracking-tight">마음 쉼터</h1>
              <p className="text-xs text-white/70">당신의 마음에 귀 기울이는 공간</p>
            </div>
            <div className="flex items-center gap-1.5 bg-white/15 backdrop-blur-sm rounded-full px-3 py-1.5">
              <span className="online-dot w-2 h-2 bg-green-300 rounded-full inline-block"></span>
              <span className="text-xs text-white/80">상담 가능</span>
            </div>
          </header>

          {/* Chat Area */}
          <div className="flex-1 overflow-y-auto scrollbar-thin p-4 space-y-4">
            {/* Date Divider */}
            <div className="flex items-center justify-center my-2">
              <div className="h-px bg-gray-200/50 flex-1"></div>
              <span className="bg-white/60 backdrop-blur-sm text-gray-400 text-xs px-4 py-1.5 rounded-full mx-3 shadow-sm">
                {new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' })}
              </span>
              <div className="h-px bg-gray-200/50 flex-1"></div>
            </div>

            {messages.map(msg => (
              <ChatBubble key={msg.id} message={msg} />
            ))}

            {isTyping && <TypingIndicator />}

            <div ref={messagesEndRef} />
          </div>

          {/* Suggestion Chips */}
          {showChips && <SuggestionChips onSelect={handleChipClick} />}

          {/* Input Area */}
          <div className="flex-shrink-0 bg-white/70 backdrop-blur-md border-t border-calm-100/50 px-3 py-3 sm:px-4">
            <div className="flex items-center gap-2.5">
              <input
                ref={inputRef}
                type="text"
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyDown={handleKeyDown}
                placeholder="마음속 이야기를 들려주세요..."
                disabled={isTyping}
                className="chat-input flex-1 bg-white/90 border border-calm-200/60 rounded-full px-4 py-3 text-[15px] text-gray-700 placeholder-gray-400 focus:outline-none focus:border-calm-400 transition-all disabled:opacity-50"
                aria-label="메시지 입력"
              />
              <button
                onClick={handleSend}
                disabled={!input.trim() || isTyping}
                className="w-11 h-11 rounded-full bg-gradient-to-r from-calm-400 to-calm-500 text-white flex items-center justify-center shadow-md hover:shadow-lg hover:scale-105 active:scale-95 transition-all disabled:opacity-40 disabled:hover:scale-100 flex-shrink-0"
                aria-label="메시지 보내기"
              >
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                </svg>
              </button>
            </div>
            <p className="text-center text-[10px] text-gray-300 mt-2.5">
              AI 상담사는 전문 상담을 대체하지 않습니다 | 위기 시 1393 또는 1577-0199
            </p>
          </div>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
