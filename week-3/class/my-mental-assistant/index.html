<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마음 상담소</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Noto Sans KR', 'sans-serif'],
          },
          colors: {
            calm: {
              50: '#f0f7ff',
              100: '#e0effe',
              200: '#bae0fd',
              300: '#7cc8fb',
              400: '#36aaf5',
              500: '#0c8ee6',
              600: '#0070c4',
            },
            sage: {
              50: '#f2f7f5',
              100: '#e0ede7',
              200: '#c3dbd0',
              300: '#9dc2b1',
              400: '#73a38e',
              500: '#528772',
            },
            lavender: {
              50: '#f5f3ff',
              100: '#ede9fe',
              200: '#ddd6fe',
              300: '#c4b5fd',
              400: '#a78bfa',
              500: '#8b5cf6',
            },
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
    }
    .bg-gradient-calm {
      background: linear-gradient(135deg, #e0effe 0%, #ede9fe 50%, #e0ede7 100%);
    }
    .bg-gradient-header {
      background: linear-gradient(135deg, #8b5cf6 0%, #7c8cf5 50%, #6cb4ee 100%);
    }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }
    .typing-dot {
      animation: typingBounce 1.4s infinite ease-in-out;
    }
    .typing-dot:nth-child(1) { animation-delay: 0s; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .message-enter {
      animation: fadeInUp 0.35s ease-out;
    }
    .scrollbar-thin::-webkit-scrollbar {
      width: 5px;
    }
    .scrollbar-thin::-webkit-scrollbar-track {
      background: transparent;
    }
    .scrollbar-thin::-webkit-scrollbar-thumb {
      background: #c4b5fd;
      border-radius: 10px;
    }
  </style>
</head>
<body class="bg-gradient-calm min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useEffect, useRef, useCallback } = React;

    // ========================================
    // OpenAI API Configuration
    // ========================================
    const OPENAI_API_KEY = 'YOUR_API_KEY_HERE'; // .env 파일에서 관리하세요

    const SYSTEM_PROMPT = `당신은 "마음 상담소"의 따뜻하고 공감능력이 뛰어난 심리 상담사입니다.

역할과 성격:
- 따뜻하고 부드러운 말투를 사용합니다
- 내담자의 감정을 먼저 공감하고 수용합니다
- 판단하지 않고 경청합니다
- 적절한 질문으로 내담자가 스스로 답을 찾도록 도와줍니다
- 필요시 간단한 심리학적 기법(호흡법, 마인드풀니스 등)을 안내합니다

규칙:
- 항상 한국어로 답변합니다
- 답변은 2~4문장 정도로 간결하게 합니다
- 자해/자살 관련 언급이 있으면 반드시 정신건강 위기상담전화 1393을 안내합니다
- 의료적 진단이나 처방은 하지 않습니다
- 전문적 도움이 필요한 경우 전문 상담을 권합니다
- 존댓말(~요, ~습니다)을 사용합니다`;

    const WELCOME_MESSAGE = "안녕하세요, 마음 상담소에 오신 것을 환영합니다. 저는 당신의 이야기를 들어드리는 AI 상담사입니다. 오늘 마음은 어떠신가요? 편하게 말씀해 주세요. 이곳은 당신만을 위한 안전한 공간입니다.";

    async function getAIResponse(conversationHistory) {
      const messages = [
        { role: 'system', content: SYSTEM_PROMPT },
        ...conversationHistory.map(msg => ({
          role: msg.sender === 'user' ? 'user' : 'assistant',
          content: msg.text,
        }))
      ];

      const response = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${OPENAI_API_KEY}`,
        },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          messages: messages,
          max_tokens: 300,
          temperature: 0.8,
        }),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.error?.message || `API 오류: ${response.status}`);
      }

      const data = await response.json();
      return data.choices[0].message.content;
    }

    function formatTime(date) {
      return date.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: true });
    }

    // ========================================
    // Design System Components
    // ========================================
    function CounselorAvatar() {
      return (
        <div className="w-10 h-10 rounded-full bg-gradient-to-br from-lavender-400 to-calm-400 flex items-center justify-center flex-shrink-0 shadow-md">
          <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
          </svg>
        </div>
      );
    }

    function TypingIndicator() {
      return (
        <div className="flex items-end gap-2 message-enter">
          <CounselorAvatar />
          <div className="bg-white/80 backdrop-blur-sm rounded-2xl rounded-bl-md px-5 py-3 shadow-sm">
            <div className="flex gap-1.5 items-center h-5">
              <span className="typing-dot w-2 h-2 bg-lavender-400 rounded-full inline-block"></span>
              <span className="typing-dot w-2 h-2 bg-lavender-300 rounded-full inline-block"></span>
              <span className="typing-dot w-2 h-2 bg-lavender-200 rounded-full inline-block"></span>
            </div>
          </div>
        </div>
      );
    }

    function ChatBubble({ message }) {
      const isUser = message.sender === 'user';
      return (
        <div className={`flex items-end gap-2 message-enter ${isUser ? 'justify-end' : 'justify-start'}`}>
          {!isUser && <CounselorAvatar />}
          <div className="max-w-[75%] sm:max-w-[65%]">
            <div className={`rounded-2xl px-4 py-3 shadow-sm leading-relaxed text-sm sm:text-base ${
              isUser
                ? 'bg-gradient-to-r from-lavender-400 to-lavender-500 text-white rounded-br-md'
                : 'bg-white/80 backdrop-blur-sm text-gray-700 rounded-bl-md'
            }`}>
              {message.text}
            </div>
            <p className={`text-[11px] text-gray-400 mt-1 px-1 ${isUser ? 'text-right' : 'text-left'}`}>
              {formatTime(message.timestamp)}
            </p>
          </div>
        </div>
      );
    }

    // ========================================
    // App Component
    // ========================================
    function App() {
      const [messages, setMessages] = useState([
        {
          id: 1,
          sender: 'counselor',
          text: WELCOME_MESSAGE,
          timestamp: new Date(),
        }
      ]);
      const [input, setInput] = useState('');
      const [isTyping, setIsTyping] = useState(false);
      const messagesEndRef = useRef(null);
      const inputRef = useRef(null);

      const scrollToBottom = useCallback(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, []);

      useEffect(() => {
        scrollToBottom();
      }, [messages, isTyping, scrollToBottom]);

      const handleSend = useCallback(async () => {
        const trimmed = input.trim();
        if (!trimmed || isTyping) return;

        const userMessage = {
          id: Date.now(),
          sender: 'user',
          text: trimmed,
          timestamp: new Date(),
        };

        const updatedMessages = [...messages, userMessage];
        setMessages(updatedMessages);
        setInput('');
        setIsTyping(true);

        try {
          const responseText = await getAIResponse(updatedMessages);
          const counselorMessage = {
            id: Date.now() + 1,
            sender: 'counselor',
            text: responseText,
            timestamp: new Date(),
          };
          setMessages(prev => [...prev, counselorMessage]);
        } catch (error) {
          const errorMessage = {
            id: Date.now() + 1,
            sender: 'counselor',
            text: `죄송합니다. 일시적인 오류가 발생했어요. 잠시 후 다시 시도해 주세요. (${error.message})`,
            timestamp: new Date(),
          };
          setMessages(prev => [...prev, errorMessage]);
        } finally {
          setIsTyping(false);
        }
      }, [input, isTyping, messages]);

      const handleKeyDown = useCallback((e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      }, [handleSend]);

      const handleChipClick = useCallback((chip) => {
        setInput(chip);
        inputRef.current?.focus();
      }, []);

      return (
        <div className="flex flex-col h-screen max-w-lg mx-auto bg-white/30 backdrop-blur-sm shadow-2xl">
          {/* Header */}
          <header className="bg-gradient-header text-white px-5 py-4 flex items-center gap-3 shadow-lg flex-shrink-0">
            <div className="w-11 h-11 rounded-full bg-white/20 flex items-center justify-center backdrop-blur-sm">
              <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
              </svg>
            </div>
            <div>
              <h1 className="text-lg font-semibold tracking-tight">마음 상담소</h1>
              <p className="text-xs text-white/70">당신의 마음에 귀 기울이는 공간</p>
            </div>
            <div className="ml-auto flex items-center gap-1.5">
              <span className="w-2 h-2 bg-green-300 rounded-full animate-pulse"></span>
              <span className="text-xs text-white/70">상담 가능</span>
            </div>
          </header>

          {/* Chat Area */}
          <div className="flex-1 overflow-y-auto scrollbar-thin p-4 space-y-4">
            {/* Date Divider */}
            <div className="flex items-center justify-center my-2">
              <span className="bg-white/60 backdrop-blur-sm text-gray-400 text-xs px-4 py-1 rounded-full">
                {new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' })}
              </span>
            </div>

            {messages.map(msg => (
              <ChatBubble key={msg.id} message={msg} />
            ))}

            {isTyping && <TypingIndicator />}

            <div ref={messagesEndRef} />
          </div>

          {/* Suggestion Chips */}
          {messages.length <= 1 && (
            <div className="px-4 pb-2 flex flex-wrap gap-2">
              {['요즘 마음이 힘들어요', '불안한 감정이 들어요', '잠이 잘 안 와요', '직장 스트레스가 커요'].map((chip) => (
                <button
                  key={chip}
                  onClick={() => handleChipClick(chip)}
                  className="text-xs bg-white/70 backdrop-blur-sm text-lavender-500 border border-lavender-200 rounded-full px-3 py-1.5 hover:bg-lavender-50 hover:border-lavender-300 transition-colors"
                >
                  {chip}
                </button>
              ))}
            </div>
          )}

          {/* Input Area */}
          <div className="flex-shrink-0 bg-white/70 backdrop-blur-md border-t border-gray-100 px-3 py-3 sm:px-4">
            <div className="flex items-center gap-2">
              <input
                ref={inputRef}
                type="text"
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyDown={handleKeyDown}
                placeholder="마음속 이야기를 들려주세요..."
                disabled={isTyping}
                className="flex-1 bg-white/80 border border-gray-200 rounded-full px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-lavender-300 focus:border-transparent transition-all disabled:opacity-50"
                aria-label="메시지 입력"
              />
              <button
                onClick={handleSend}
                disabled={!input.trim() || isTyping}
                className="w-10 h-10 rounded-full bg-gradient-to-r from-lavender-400 to-lavender-500 text-white flex items-center justify-center shadow-md hover:shadow-lg transition-all disabled:opacity-40 disabled:cursor-not-allowed active:scale-95 flex-shrink-0"
                aria-label="메시지 보내기"
              >
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                </svg>
              </button>
            </div>
            <p className="text-center text-[10px] text-gray-300 mt-2">
              이 상담소는 참고용이며, 전문 상담이 필요하시면 1393으로 연락해 주세요.
            </p>
          </div>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
