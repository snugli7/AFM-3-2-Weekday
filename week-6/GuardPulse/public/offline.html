<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GuardPulse - 오프라인</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #fef2f2;
      color: #1f2937;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.75rem; margin-bottom: 0.75rem; color: #e11d48; }
    p { font-size: 1.25rem; color: #6b7280; line-height: 1.6; }
    .retry {
      margin-top: 2rem;
      padding: 1rem 2rem;
      font-size: 1.25rem;
      background: #e11d48;
      color: white;
      border: none;
      border-radius: 0.75rem;
      cursor: pointer;
    }
    .retry:hover { background: #be123c; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>인터넷 연결 없음</h1>
    <p>네트워크 연결을 확인해 주세요.<br/>연결이 복구되면 자동으로 업데이트됩니다.</p>
    <button class="retry" onclick="location.reload()">다시 시도</button>
  </div>
</body>
</html>
