    // Cart Context
    // ========================================
    const CartContext = createContext();

    function CartProvider({ children }) {
      const [items, setItems] = useState([]);

      const addItem = useCallback((bean) => {
        setItems(prev => {
          const existing = prev.find(item => item.id === bean.id);
          if (existing) {
            return prev.map(item => item.id === bean.id ? { ...item, quantity: item.quantity + 1 } : item);
          }
          return [...prev, { ...bean, quantity: 1 }];
        });
      }, []);

      const removeItem = useCallback((id) => {
        setItems(prev => prev.filter(item => item.id !== id));
      }, []);

      const updateQuantity = useCallback((id, quantity) => {
        if (quantity <= 0) {
          setItems(prev => prev.filter(item => item.id !== id));
          return;
        }
        setItems(prev => prev.map(item => item.id === id ? { ...item, quantity } : item));
      }, []);

      const totalCount = useMemo(() => items.reduce((sum, item) => sum + item.quantity, 0), [items]);
      const totalPrice = useMemo(() => items.reduce((sum, item) => sum + item.price * item.quantity, 0), [items]);

      return (
        <CartContext.Provider value={{ items, addItem, removeItem, updateQuantity, totalCount, totalPrice }}>
          {children}
        </CartContext.Provider>
      );
    }

    function useCart() {
      return useContext(CartContext);
    }

        primary: 'bg-coffee-700 text-white hover:bg-coffee-800 focus:ring-coffee-500 shadow-md hover:shadow-lg',
        secondary: 'bg-coffee-100 text-coffee-800 hover:bg-coffee-200 focus:ring-coffee-300',

        sm: 'px-3 py-1.5 text-sm',
        md: 'px-5 py-2.5 text-sm',
        lg: 'px-7 py-3.5 text-base',

      return (

          onClick={onClick}
          disabled={disabled}
          className={`${base} ${variants[variant]} ${sizes[size]} ${disabled ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer'} ${className}`}
          {...props}
        >
          {children}
        </button>
      );

    function Modal({ isOpen, onClose, title, children, size = 'lg' }) {
      const modalRef = useRef(null);

      useEffect(() => {
        if (isOpen) {
          document.body.style.overflow = 'hidden';
        } else {
          document.body.style.overflow = '';
        }
        return () => { document.body.style.overflow = ''; };
      }, [isOpen]);

        const handleKey = (e) => { if (e.key === 'Escape') onClose(); };
        if (isOpen) window.addEventListener('keydown', handleKey);
        return () => window.removeEventListener('keydown', handleKey);
      }, [isOpen, onClose]);

      if (!isOpen) return null;

      const sizes = { md: 'max-w-md', lg: 'max-w-2xl', xl: 'max-w-4xl' };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" role="dialog" aria-modal="true">

    function useHashRoute() {
      const [route, setRoute] = useState(window.location.hash || '#/');
      useEffect(() => {
        const onHashChange = () => setRoute(window.location.hash || '#/');
        window.addEventListener('hashchange', onHashChange);
        return () => window.removeEventListener('hashchange', onHashChange);
      }, []);
      return route;
    }

    // Hash routing safe query parser — merges location.search + hash query
    function parseHashQuery() {
      const params = new URLSearchParams();
      const search = new URLSearchParams(window.location.search);
      search.forEach((value, key) => params.set(key, value));
      const hash = window.location.hash;
      const queryIndex = hash.indexOf('?');
      if (queryIndex !== -1) {
        const hashSearch = new URLSearchParams(hash.slice(queryIndex + 1));
        hashSearch.forEach((value, key) => params.set(key, value));
      }
      return params;
    }

    const CLIENT_KEY = 'test_gck_docs_Ovk5rk1EwkEbP0W43n07xlzm';

    // ========================================

    // ========================================
    function CheckoutPage() {
      const { items, totalPrice, totalCount } = useCart();
      const widgetsRef = useRef(null);
      const isRenderedRef = useRef(false);
      const [ready, setReady] = useState(false);
      const [loading, setLoading] = useState(false);

      const shippingFee = totalPrice >= 50000 ? 0 : 3000;
      const finalAmount = totalPrice + shippingFee;

      useEffect(() => {
        if (items.length === 0 || !finalAmount) return;

        const init = async () => {
          try {
            const tossPayments = TossPayments(CLIENT_KEY);
            const widgets = tossPayments.widgets({ customerKey: TossPayments.ANONYMOUS });
            widgetsRef.current = widgets;

            await widgets.setAmount({ currency: 'KRW', value: finalAmount });

            if (!isRenderedRef.current) {
              await widgets.renderPaymentMethods({ selector: '#payment-method', variantKey: 'DEFAULT' });
              await widgets.renderAgreement({ selector: '#agreement', variantKey: 'AGREEMENT' });
              isRenderedRef.current = true;
            }
            setReady(true);
          } catch (err) {
            console.error('위젯 초기화 실패:', err);
          }
        };
        init();
      }, []);

      useEffect(() => {
        if (widgetsRef.current && isRenderedRef.current && finalAmount > 0) {
          widgetsRef.current.setAmount({ currency: 'KRW', value: finalAmount });
        }
      }, [finalAmount]);

      const handlePayment = async () => {
        if (!widgetsRef.current) return;
        setLoading(true);
        try {
          const orderId = 'ORIGIN_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
          const orderName = items.length === 1 ? items[0].name : `${items[0].name} 외 ${items.length - 1}건`;
          const currentUrl = window.location.origin + window.location.pathname;

          await widgetsRef.current.requestPayment({
            orderId,
            orderName,
            successUrl: currentUrl + '#/payments/success',
            failUrl: currentUrl + '#/payments/fail',
          });
        } catch (error) {
          if (error.code === 'USER_CANCEL') {
            // 사용자가 취소함
          } else {
            alert(`결제 오류: ${error.message}`);
          }
        } finally {
          setLoading(false);
        }
      };

      if (items.length === 0) {
        return (
          <div className="min-h-screen bg-cream flex items-center justify-center">
            <div className="text-center">
              <span className="text-6xl block mb-4">&#128717;</span>
              <p className="text-coffee-500 text-lg mb-6">장바구니가 비어있습니다</p>
              <Button variant="primary" onClick={() => window.location.hash = '#/'}>쇼핑 계속하기</Button>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-cream pt-8 pb-20">
          <div className="max-w-2xl mx-auto px-4">
            <button onClick={() => window.location.hash = '#/'} className="flex items-center gap-2 text-coffee-500 hover:text-coffee-700 mb-6 transition-colors">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7"/></svg>
              쇼핑으로 돌아가기
            </button>

            <h1 className="font-display text-3xl font-bold text-coffee-900 mb-8">주문 / 결제</h1>

            {/* 주문 상품 요약 */}
            <div className="bg-white rounded-2xl p-6 shadow-sm border border-coffee-100 mb-6">
              <h2 className="text-lg font-bold text-coffee-800 mb-4">주문 상품 ({totalCount}개)</h2>
              <div className="space-y-3">
                {items.map(item => (
                  <div key={item.id} className="flex items-center gap-4">
                    <div className="w-14 h-14 rounded-lg overflow-hidden flex-shrink-0">
                      <img src={item.image} alt={item.name} className="w-full h-full object-cover" />
                    </div>
                    <div className="flex-1 min-w-0">
                      <p className="text-sm font-semibold text-coffee-800 truncate">{item.name}</p>
                      <p className="text-xs text-coffee-400">{item.weight} x {item.quantity}개</p>
                    </div>
                    <p className="text-sm font-bold text-coffee-700">{(item.price * item.quantity).toLocaleString()}원</p>
                  </div>
                ))}
              </div>
              <div className="mt-4 pt-4 border-t border-coffee-100 space-y-2">
                <div className="flex justify-between text-sm text-coffee-500">
                  <span>상품 합계</span>
                  <span>{totalPrice.toLocaleString()}원</span>
                </div>
                <div className="flex justify-between text-sm text-coffee-500">
                  <span>배송비</span>
                  <span>{shippingFee === 0 ? '무료' : `${shippingFee.toLocaleString()}원`}</span>
                </div>
                <div className="flex justify-between text-lg font-bold text-coffee-900 pt-2 border-t border-coffee-100">
                  <span>총 결제 금액</span>
                  <span>{finalAmount.toLocaleString()}원</span>
                </div>
              </div>
            </div>

            {/* 토스페이먼츠 결제 위젯 */}
            <div className="bg-white rounded-2xl p-6 shadow-sm border border-coffee-100 mb-6">
              <h2 className="text-lg font-bold text-coffee-800 mb-4">결제 수단</h2>
              <div id="payment-method" className="mb-4"></div>
              <div id="agreement"></div>
            </div>

            <Button
              variant="primary"
              size="lg"
              className="w-full"
              onClick={handlePayment}
              disabled={!ready || loading}
            >
              {loading ? '결제 처리 중...' : `${finalAmount.toLocaleString()}원 결제하기`}
            </Button>
          </div>
        </div>
      );
    }

    // ========================================
    // Payment Success Page
    // ========================================
    function SuccessPage() {
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);
      const [loading, setLoading] = useState(true);
      const confirmedRef = useRef(false);

      useEffect(() => {
        if (confirmedRef.current) return;
        confirmedRef.current = true;

        // 디버그: 토스가 리다이렉트한 실제 URL 확인
        console.log('[SUCCESS] Full URL:', window.location.href);
        console.log('[SUCCESS] search:', window.location.search);
        console.log('[SUCCESS] hash:', window.location.hash);

        const query = parseHashQuery();
        const paymentKey = query.get('paymentKey');
        const orderId = query.get('orderId');
        const amount = query.get('amount');

        console.log('[SUCCESS] parsed:', { paymentKey, orderId, amount });

        if (!paymentKey || !orderId || !amount) {
          setError('결제 정보가 올바르지 않습니다.');
          setLoading(false);
          return;
        }

        fetch(`/api/payments/confirm?paymentKey=${encodeURIComponent(paymentKey)}&orderId=${encodeURIComponent(orderId)}&amount=${encodeURIComponent(amount)}`)
          .then(res => res.json())
          .then(data => {
            console.log('[SUCCESS] confirm response:', data);
            if (data.error) {
              setError(data.message || '결제 승인에 실패했습니다.');
            } else {
              setResult(data);
              const cleanUrl = window.location.pathname + '#/payments/success';
              window.history.replaceState({}, '', cleanUrl);
            }
          })
          .catch(err => { console.error('[SUCCESS] fetch error:', err); setError('서버 연결에 실패했습니다.'); })
          .finally(() => setLoading(false));
      }, []);

      return (
        <div className="min-h-screen bg-cream flex items-center justify-center px-4">
          <div className="max-w-md w-full bg-white rounded-2xl p-8 shadow-sm border border-coffee-100 text-center">
            {loading ? (
              <>
                <div className="w-16 h-16 border-4 border-coffee-200 border-t-coffee-600 rounded-full animate-spin mx-auto mb-4"></div>
                <p className="text-coffee-600 text-lg font-medium">결제를 확인하고 있습니다...</p>
              </>
            ) : error ? (
              <>
                <div className="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
                  <svg className="w-10 h-10 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </div>
                <h1 className="text-2xl font-bold text-coffee-900 mb-2">결제 실패</h1>
                <p className="text-coffee-500 mb-6">{error}</p>
                <Button variant="primary" onClick={() => window.location.hash = '#/'}>홈으로 돌아가기</Button>
              </>
            ) : (
              <>
                <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                  <svg className="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"/></svg>
                </div>
                <h1 className="text-2xl font-bold text-coffee-900 mb-2">결제가 완료되었습니다!</h1>
                <p className="text-coffee-500 mb-6">주문해 주셔서 감사합니다.</p>
                {result && (
                  <div className="bg-coffee-50 rounded-xl p-4 mb-6 text-left space-y-2">
                    <div className="flex justify-between text-sm">
                      <span className="text-coffee-400">주문번호</span>
                      <span className="text-coffee-700 font-medium">{result.orderId}</span>
                    </div>
                    <div className="flex justify-between text-sm">
                      <span className="text-coffee-400">결제 금액</span>
                      <span className="text-coffee-700 font-medium">{Number(result.totalAmount).toLocaleString()}원</span>
                    </div>
                    <div className="flex justify-between text-sm">
                      <span className="text-coffee-400">결제 방법</span>
                      <span className="text-coffee-700 font-medium">{result.method || '-'}</span>
                    </div>
                    <div className="flex justify-between text-sm">
                      <span className="text-coffee-400">승인 일시</span>
                      <span className="text-coffee-700 font-medium">{result.approvedAt ? new Date(result.approvedAt).toLocaleString('ko-KR') : '-'}</span>
                    </div>
                  </div>
                )}
                <Button variant="primary" onClick={() => window.location.hash = '#/'}>쇼핑 계속하기</Button>
              </>
            )}
          </div>
        </div>
      );
    }

    // ========================================
    // Payment Fail Page
    // ========================================
    function FailPage() {
      const query = parseHashQuery();
      const code = query.get('code') || '알 수 없음';
      const message = query.get('message') || '결제에 실패했습니다.';

      return (
        <div className="min-h-screen bg-cream flex items-center justify-center px-4">
          <div className="max-w-md w-full bg-white rounded-2xl p-8 shadow-sm border border-coffee-100 text-center">
            <div className="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
              <svg className="w-10 h-10 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.5c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
            </div>
            <h1 className="text-2xl font-bold text-coffee-900 mb-2">결제 실패</h1>
            <p className="text-coffee-500 mb-2">{message}</p>
            <p className="text-sm text-coffee-300 mb-6">에러 코드: {code}</p>
            <div className="flex gap-3 justify-center">
              <Button variant="secondary" onClick={() => window.location.hash = '#/checkout'}>다시 시도</Button>
              <Button variant="primary" onClick={() => window.location.hash = '#/'}>홈으로</Button>
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // App Component
    // ========================================
    function App() {
      const [cartOpen, setCartOpen] = useState(false);

      return (
        <CartProvider>
          <AppInner cartOpen={cartOpen} setCartOpen={setCartOpen} />
        </CartProvider>
      );
    }

    function AppInner({ cartOpen, setCartOpen }) {
      const route = useHashRoute();
      const routePath = route.split('?')[0];

      if (routePath === '#/checkout') {
        return <CheckoutPage />;
      }
      if (routePath === '#/payments/success') {
        return <SuccessPage />;
      }
      if (routePath === '#/payments/fail') {
        return <FailPage />;
      }

      return (
        <div className="min-h-screen bg-cream">
          <Header onCartOpen={() => setCartOpen(true)} />
          <main>
            <HeroSection />
            <BeansSection />
          </main>
          <Footer />
          <CartDrawer isOpen={cartOpen} onClose={() => setCartOpen(false)} />
        </div>
      );
    }

    // ========================================
    // Render
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
